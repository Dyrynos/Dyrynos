<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dyrynos — D&D 2024 Character Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --parch:#f5edd6;--parch2:#ede0bc;--parch3:#e0cfa0;
  --ink:#1a1208;--ink2:#3d2b0e;--ink3:#6b4c1e;
  --blood:#8b1a1a;--gold:#b8860b;--gold2:#d4a017;
  --accent:#5a1e1e;--border:#8b6914;
}
body{font-family:'Crimson Pro',Georgia,serif;background:#1a0e05;color:var(--ink);min-height:100vh;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1rem;background:#120800;border-bottom:1.5px solid var(--gold);flex-shrink:0;}
header h1{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold2);letter-spacing:0.1em;}
header p{font-size:0.7rem;color:#a08040;font-style:italic;}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;}
.hdr-btn{background:rgba(139,105,20,0.12);border:1px solid var(--gold);color:var(--gold2);font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;padding:0.3rem 0.6rem;cursor:pointer;border-radius:3px;}
.hdr-btn:hover{background:rgba(139,105,20,0.28);}
.body-area{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:180px;min-width:180px;background:#0f0803;border-right:1px solid #3a2800;display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:640px){.sidebar{width:140px;min-width:140px;}}
.sidebar-inner{flex:1;overflow-y:auto;padding:0.6rem;}
.sb-title{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-bottom:0.4rem;padding-bottom:0.25rem;border-bottom:1px solid #3a2800;}
.char-item{background:rgba(180,130,20,0.06);border:1px solid #3a2800;border-radius:3px;padding:0.35rem 0.5rem;cursor:pointer;margin-bottom:3px;transition:all 0.15s;}
.char-item:hover,.char-item.active{background:rgba(180,130,20,0.18);border-color:var(--gold);}
.char-item .cn{font-size:0.8rem;color:#e8d090;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-item .cs{font-size:0.65rem;color:#806030;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-new{width:100%;padding:0.4rem;background:rgba(139,26,26,0.25);border:1px solid var(--blood);color:#e09090;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;cursor:pointer;border-radius:3px;margin-top:0.4rem;}
.btn-new:hover{background:rgba(139,26,26,0.45);}
.sb-act{width:100%;padding:0.35rem 0.5rem;background:transparent;border:1px solid #3a2800;color:#906030;font-family:'Crimson Pro',serif;font-size:0.78rem;cursor:pointer;border-radius:2px;margin-bottom:3px;text-align:left;}
.sb-act:hover{border-color:var(--gold);color:var(--gold2);background:rgba(180,130,20,0.08);}

/* ── TAB BAR ── */
.tab-bar{display:flex;background:#0c0703;border-bottom:1px solid var(--gold);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar button{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.07em;padding:0.55rem 0.9rem;background:none;border:none;color:#806030;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-bar button:hover{color:var(--gold2);}
.tab-bar button.active{color:var(--gold2);border-bottom-color:var(--gold2);background:rgba(180,130,20,0.08);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;background:var(--parch);padding:1rem;}

/* ── PANELS ── */
.pg{display:grid;gap:0.75rem;}
.pg2{grid-template-columns:1fr 1fr;}
.pg3{grid-template-columns:1fr 1fr 1fr;}
.pg12{grid-template-columns:1fr 2fr;}
.pg21{grid-template-columns:2fr 1fr;}
.s2{grid-column:span 2;}
.s3{grid-column:span 3;}
@media(max-width:700px){.pg2,.pg3,.pg12,.pg21{grid-template-columns:1fr;}.s2,.s3{grid-column:span 1;}}
.panel{background:rgba(255,255,255,0.32);border:1px solid var(--border);border-radius:4px;padding:0.6rem 0.7rem;position:relative;}
.panel::after{content:'';position:absolute;inset:3px;border:1px solid rgba(184,134,11,0.15);border-radius:2px;pointer-events:none;}
.ptitle{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:0.5rem;padding-bottom:0.35rem;border-bottom:1px solid rgba(139,105,20,0.3);}
.pg-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--accent);text-align:center;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid rgba(139,105,20,0.25);letter-spacing:0.1em;}

/* ── FORM ELEMENTS ── */
.fi{background:rgba(255,255,255,0.5);border:1px solid rgba(139,105,20,0.45);border-radius:2px;padding:3px 6px;font-size:0.85rem;color:var(--ink);font-family:'Crimson Pro',serif;width:100%;}
.fi:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.75);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;font-family:'Crimson Pro',serif;line-height:1.45;}
.fl{font-size:0.65rem;color:var(--ink3);font-variant:small-caps;letter-spacing:0.04em;margin-bottom:2px;display:block;}

/* ── ABILITY BOXES ── */
.ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
@media(max-width:400px){.ab-grid{grid-template-columns:repeat(2,1fr);}}
.ab-box{text-align:center;background:rgba(255,255,255,0.38);border:1px solid rgba(139,105,20,0.45);border-radius:4px;padding:5px 3px;}
.ab-name{font-size:0.55rem;letter-spacing:0.1em;color:var(--accent);font-variant:small-caps;}
.ab-mod{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--ink2);line-height:1.1;min-height:1.4rem;}
.ab-score{width:38px;text-align:center;border:1px solid rgba(139,105,20,0.55);background:rgba(255,255,255,0.6);border-radius:2px;font-size:0.82rem;padding:1px 3px;font-family:'Crimson Pro',serif;margin-top:2px;}
.ab-score:focus{outline:none;border-color:var(--gold);}

/* ── BIG STAT ── */
.big-stat{text-align:center;background:rgba(255,255,255,0.35);border:1px solid rgba(139,105,20,0.4);border-radius:3px;padding:6px 4px;}
.big-num{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:var(--ink2);line-height:1;}
.big-lbl{font-size:0.55rem;letter-spacing:0.1em;color:var(--ink3);font-variant:small-caps;margin-top:2px;}
.big-edit{width:44px;text-align:center;border:1px solid rgba(139,105,20,0.4);background:rgba(255,255,255,0.5);border-radius:2px;font-size:0.78rem;padding:2px;margin-top:3px;font-family:'Crimson Pro',serif;}
.big-edit:focus{outline:none;border-color:var(--gold);}

/* ── SKILLS ── */
.sk-row{display:flex;align-items:center;gap:4px;font-size:0.78rem;color:var(--ink2);margin-bottom:2px;}
.sk-row input[type=checkbox]{accent-color:var(--blood);width:13px;height:13px;cursor:pointer;flex-shrink:0;}
.sk-mod{font-weight:600;min-width:24px;font-size:0.76rem;color:var(--ink3);}
.sk-name{flex:1;}
.sk-attr{font-size:0.63rem;color:var(--ink3);font-style:italic;}

/* ── HP ── */
.hp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px;}
.hp-box{text-align:center;}
.hp-box input{width:100%;text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:var(--ink2);background:rgba(255,255,255,0.5);border:1px solid rgba(139,105,20,0.45);border-radius:2px;padding:3px 2px;}
.hp-box input:focus{outline:none;border-color:var(--gold);}
.hp-lbl{font-size:0.55rem;color:var(--ink3);letter-spacing:0.07em;font-variant:small-caps;margin-top:2px;}

/* ── DEATH SAVES ── */
.pip{width:13px;height:13px;border-radius:50%;border:1.5px solid;cursor:pointer;display:inline-block;transition:background 0.12s;}
.pip.s{border-color:#2a7a2a;}.pip.s.on{background:#2a7a2a;}
.pip.f{border-color:var(--blood);}.pip.f.on{background:var(--blood);}

/* ── ATTACKS ── */
.atk-tbl{width:100%;border-collapse:collapse;font-size:0.8rem;}
.atk-tbl th{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.1em;color:var(--accent);border-bottom:1px solid rgba(139,105,20,0.35);padding:2px 3px;text-align:left;}
.atk-tbl td{padding:2px 3px;border-bottom:1px solid rgba(139,105,20,0.12);}
.atk-tbl input{width:100%;background:transparent;border:none;border-bottom:1px dashed rgba(139,105,20,0.25);font-size:0.8rem;font-family:'Crimson Pro',serif;color:var(--ink);}
.atk-tbl input:focus{outline:none;border-bottom-color:var(--gold);}

/* ── SPELL SLOTS ── */
.ss-slot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--gold);cursor:pointer;display:inline-block;}
.ss-slot.used{background:rgba(139,26,26,0.4);border-color:var(--blood);}

/* ── CURRENCY ── */
.curr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.curr-box{text-align:center;}
.curr-box input{width:100%;text-align:center;background:rgba(255,255,255,0.5);border:1px solid rgba(139,105,20,0.45);border-radius:2px;font-size:0.82rem;padding:2px;font-family:'Crimson Pro',serif;}
.curr-box input:focus{outline:none;border-color:var(--gold);}
.curr-lbl{font-size:0.6rem;color:var(--ink3);font-variant:small-caps;letter-spacing:0.06em;margin-top:2px;}

/* ── FEATURE CARDS ── */
.feat-card{background:rgba(255,255,255,0.28);border:1px solid rgba(139,105,20,0.35);border-radius:3px;padding:0.45rem 0.55rem;margin-bottom:0.4rem;}
.feat-card h4{font-family:'Cinzel',serif;font-size:0.72rem;color:var(--accent);margin-bottom:2px;}
.feat-card p{font-size:0.78rem;color:var(--ink2);line-height:1.4;}
.feat-meta{font-size:0.65rem;color:var(--ink3);font-style:italic;margin-top:2px;}

/* ── MISC ── */
.tag{display:inline-block;font-size:0.65rem;background:rgba(139,105,20,0.1);border:1px solid rgba(139,105,20,0.28);color:var(--ink3);border-radius:2px;padding:1px 5px;margin:2px;cursor:pointer;}
.tag.on{background:rgba(139,26,26,0.15);border-color:var(--blood);color:var(--accent);}
.btn-add{width:100%;padding:3px;background:transparent;border:1px dashed rgba(139,105,20,0.45);color:var(--ink3);font-size:0.72rem;cursor:pointer;border-radius:2px;margin-top:3px;}
.btn-add:hover{border-color:var(--gold);color:var(--ink2);}
.insp{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;color:transparent;transition:all 0.15s;}
.insp.on{background:var(--gold);color:var(--ink2);}
.notice{text-align:center;padding:3rem 1rem;color:var(--ink3);font-style:italic;}
.save-row{display:flex;align-items:center;gap:5px;font-size:0.8rem;margin-bottom:3px;}
.save-row input[type=checkbox]{accent-color:var(--blood);cursor:pointer;}

/* ── BACKGROUND DEFAULTS UI ── */
.eq-card{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 10px;background:rgba(255,255,255,0.35);border:1.5px solid rgba(139,105,20,0.35);border-radius:3px;cursor:pointer;font-size:0.78rem;color:var(--ink2);transition:all 0.15s;flex:1;}
.eq-card:hover{border-color:var(--gold);}
.eq-card.on{background:rgba(139,105,20,0.14);border-color:var(--gold);color:var(--ink);font-weight:600;}
.btn-apply{padding:4px 10px;background:rgba(139,26,26,0.15);border:1px solid var(--blood);color:var(--accent);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.06em;cursor:pointer;border-radius:2px;margin-top:4px;}
.btn-apply:hover:not(:disabled){background:rgba(139,26,26,0.3);}
.btn-apply:disabled{opacity:0.5;cursor:not-allowed;}
.ab-pick-sel{background:rgba(255,255,255,0.55);border:1px solid rgba(139,105,20,0.45);border-radius:2px;padding:2px 4px;font-size:0.8rem;font-family:'Crimson Pro',serif;color:var(--ink);cursor:pointer;}
.ab-pick-sel:focus{outline:none;border-color:var(--gold);}

/* ── TOOLTIPS ── */
.tip-wrap{position:relative;display:inline-block;cursor:help;}
.has-tip{position:relative;cursor:help;}
.tip{display:none;position:absolute;background:#120800;border:1px solid var(--gold);color:var(--gold2);font-family:'Crimson Pro',serif;font-size:0.72rem;padding:4px 9px;border-radius:3px;white-space:nowrap;z-index:500;pointer-events:none;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);line-height:1.5;}
.tip-wrap:hover .tip,.has-tip:hover .tip{display:block;}
.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--gold);}
/* right-pointing variant for inline list rows */
.tip-r .tip{bottom:auto;top:50%;left:calc(100% + 6px);transform:translateY(-50%);}
.tip-r .tip::after{top:50%;left:-10px;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--gold);}

/* ════════════════════════════════
   PRINT STYLES — Official 2014-style layout
   ════════════════════════════════ */
@media print {
  @page{size:letter portrait;margin:0.35in;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;font-family:Arial,Helvetica,sans-serif;}
  .app{display:none!important;}
  #print-sheet{display:block!important;}
}
#print-sheet{display:none;}

@media print {
  /* ── SHEET WRAPPER ── */
  #print-sheet{display:block!important;font-family:Arial,Helvetica,sans-serif;font-size:7pt;color:#000;width:100%;}

  /* ── HEADER ── */
  .ps-name-bar{background:#58180D;color:#fff;font-size:13pt;font-weight:bold;padding:3pt 8pt;letter-spacing:0.06em;margin-bottom:2pt;}
  .ps-hdr-row{display:flex;border:1pt solid #58180D;margin-bottom:5pt;}
  .ps-hdr-field{flex:1;padding:1.5pt 4pt;border-right:1pt solid #58180D;}
  .ps-hdr-field:last-child{border-right:none;}
  .ps-hdr-val{font-size:8pt;font-weight:bold;min-height:10pt;}
  .ps-hdr-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.06em;border-top:0.5pt solid #58180D;margin-top:1.5pt;padding-top:1pt;}

  /* ── 3-COLUMN BODY ── */
  .ps-body{display:grid;grid-template-columns:1.5in 2.5in 1fr;gap:5pt;}

  /* ── ABILITY SCORE BOXES ── */
  .ps-ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:3pt;margin-bottom:3pt;}
  .ps-ab{border:1.5pt solid #58180D;border-radius:3pt;text-align:center;padding:2pt 2pt 3pt;}
  .ps-ab-label{font-size:4pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;margin-bottom:1pt;}
  .ps-ab-mod{font-family:Georgia,serif;font-size:17pt;font-weight:bold;line-height:1;margin:1pt 0;}
  .ps-ab-score{border:0.75pt solid #58180D;border-radius:2pt;font-size:6.5pt;font-weight:bold;display:inline-block;padding:0.5pt 5pt;min-width:18pt;}

  /* ── INSPIRATION + PROF BONUS ── */
  .ps-insp-prof{display:flex;gap:3pt;margin-bottom:3pt;}
  .ps-stat-box{flex:1;border:1.5pt solid #58180D;border-radius:2pt;text-align:center;padding:1.5pt 2pt;}
  .ps-stat-val{font-family:Georgia,serif;font-size:12pt;font-weight:bold;line-height:1.2;min-height:13pt;}
  .ps-stat-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;border-top:0.75pt solid #58180D;margin-top:1.5pt;padding-top:1pt;}

  /* ── SECTION BLOCKS ── */
  .ps-sect{border:1.5pt solid #58180D;border-radius:2pt;overflow:hidden;margin-bottom:3pt;}
  .ps-sect-title{background:#58180D;color:#fff;font-size:5.5pt;font-weight:bold;text-transform:uppercase;letter-spacing:0.1em;padding:1.5pt 4pt;text-align:center;}
  .ps-sect-body{padding:3pt 4pt;}

  /* ── PROFICIENCY ROWS (saves/skills) ── */
  .ps-prow{display:flex;align-items:center;gap:2pt;margin-bottom:1.5pt;}
  .ps-dot{width:5.5pt;height:5.5pt;border-radius:50%;border:0.75pt solid #333;flex-shrink:0;display:inline-block;}
  .ps-dot.on{background:#333;}
  .ps-prow-mod{font-size:6pt;font-weight:bold;min-width:13pt;text-align:right;}
  .ps-prow-name{font-size:5.5pt;flex:1;}
  .ps-prow-attr{font-size:4.5pt;color:#666;margin-left:1pt;}

  /* ── PASSIVE PERCEPTION ── */
  .ps-passive-row{display:flex;align-items:center;gap:4pt;border:1.5pt solid #58180D;border-radius:2pt;padding:2pt 4pt;margin-bottom:3pt;}
  .ps-passive-val{font-family:Georgia,serif;font-size:12pt;font-weight:bold;}
  .ps-passive-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;}

  /* ── COMBAT STAT ROW ── */
  .ps-cstat-row{display:flex;gap:3pt;margin-bottom:3pt;}
  .ps-cstat{flex:1;border:1.5pt solid #58180D;border-radius:2pt;text-align:center;padding:2pt 1pt 1.5pt;}
  .ps-cstat-val{font-family:Georgia,serif;font-size:13pt;font-weight:bold;line-height:1;}
  .ps-cstat-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;border-top:0.75pt solid #58180D;margin-top:2pt;padding-top:1pt;}

  /* ── HIT POINTS ── */
  .ps-hp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3pt;padding:3pt 4pt;}
  .ps-hp-cell{text-align:center;}
  .ps-hp-val{font-family:Georgia,serif;font-size:13pt;font-weight:bold;border-bottom:0.5pt solid #999;min-height:14pt;padding-bottom:1pt;}
  .ps-hp-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;margin-top:1pt;}

  /* ── HIT DICE + DEATH SAVES ROW ── */
  .ps-hd-ds-row{display:grid;grid-template-columns:1fr 1.4fr;gap:3pt;margin-bottom:3pt;}
  .ps-ds-row{display:flex;gap:6pt;padding:3pt 4pt;}
  .ps-ds-col{flex:1;text-align:center;}
  .ps-ds-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#444;margin-bottom:2pt;}
  .ps-ds-pips{display:flex;gap:2.5pt;justify-content:center;}
  .ps-pip{width:7pt;height:7pt;border-radius:50%;border:0.75pt solid #333;display:inline-block;}
  .ps-pip.on{background:#333;}

  /* ── ATTACKS TABLE ── */
  .ps-atk-hdr,.ps-atk-row{display:grid;grid-template-columns:1.6fr 0.7fr 1fr;gap:2pt;padding:0 4pt;margin-bottom:2pt;}
  .ps-atk-hdr span{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;border-bottom:0.5pt solid #58180D;padding-bottom:1pt;}
  .ps-atk-cell{font-size:6.5pt;border-bottom:0.5pt solid #ddd;padding-bottom:2pt;min-height:9pt;}

  /* ── CURRENCY ── */
  .ps-coin-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3pt;margin-bottom:3pt;}
  .ps-coin{text-align:center;}
  .ps-coin-val{font-size:9pt;font-weight:bold;border-bottom:0.5pt solid #999;min-height:11pt;padding-bottom:1pt;}
  .ps-coin-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;}
  .ps-equip-text{font-size:6.5pt;line-height:1.4;white-space:pre-wrap;min-height:38pt;}

  /* ── CHARACTER TRAITS ── */
  .ps-trait{margin-bottom:4pt;}
  .ps-trait-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.06em;border-bottom:0.5pt solid #58180D;padding-bottom:1pt;margin-bottom:2pt;}
  .ps-trait-val{font-size:6.5pt;line-height:1.4;min-height:16pt;white-space:pre-wrap;}

  /* ── FEATURES ── */
  .ps-feat{margin-bottom:3.5pt;}
  .ps-feat-name{font-size:6.5pt;font-weight:bold;color:#1a0800;}
  .ps-feat-desc{font-size:6pt;line-height:1.35;color:#333;}
}
</style>
</head>
<body>

// FIX: correct modifier formula — floor((score - 10) / 2)
function getMod(score) {
  const s = parseInt(score);
  if (isNaN(s)) return 0;
  return Math.floor((s - 10) / 2);
}
function modStr(n){return(n>=0?'+':'')+n;}
function getPB(level){return PROF_BONUS[Math.min(parseInt(level)||1,20)]||2;}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function selOpts(arr,val){return arr.map(o=>`<option${o===val?' selected':''}>${esc(o)}</option>`).join('');}
function calcAC(s){
  const dex=getMod(parseInt(s.DEX)||10),con=getMod(parseInt(s.CON)||10),wis=getMod(parseInt(s.WIS)||10);
  const nm=s.armorName||'Unarmored';const sh=s.shield?2:0;
  const ar=ARMORS.find(a=>a.n===nm)||ARMORS[0];
  let t,tip;
  if(ar.t==='unarmored'){
    if(s.class==='Barbarian'){t=10+dex+con+sh;tip=`10 base + DEX ${modStr(dex)} + CON ${modStr(con)}${sh?' + 2 shield':''} = ${t}`;}
    else if(s.class==='Monk'){t=10+dex+wis+sh;tip=`10 base + DEX ${modStr(dex)} + WIS ${modStr(wis)}${sh?' + 2 shield':''} = ${t}`;}
    else{t=10+dex+sh;tip=`10 base + DEX ${modStr(dex)}${sh?' + 2 shield':''} = ${t}`;}
  }else if(ar.t==='light'){t=ar.b+dex+sh;tip=`${ar.b} (${nm}) + DEX ${modStr(dex)}${sh?' + 2 shield':''} = ${t}`;}
  else if(ar.t==='medium'){const db=Math.min(dex,2);t=ar.b+db+sh;tip=`${ar.b} (${nm}) + DEX ${modStr(db)} (max +2)${sh?' + 2 shield':''} = ${t}`;}
  else{t=ar.b+sh;tip=`${ar.b} (${nm})${sh?' + 2 shield':''} = ${t}`;}
  return{ac:t,tip};
}
function calcInit(s){
  const d=getMod(parseInt(s.DEX)||10),b=parseInt(s.initiativeBonus)||0,t=d+b;
  return{init:t,tip:b?`DEX ${modStr(d)} + bonus ${modStr(b)} = ${modStr(t)}`:`DEX modifier ${modStr(d)}`};
}
function getPreparedLimit(s){
  const level=parseInt(s.level)||1;
  const PREP={Wizard:{ab:'INT',div:1},Cleric:{ab:'WIS',div:1},Druid:{ab:'WIS',div:1},Paladin:{ab:'CHA',div:2},Ranger:{ab:'WIS',div:2}};
  const info=PREP[s.class];if(!info)return null;
  const mod=getMod(parseInt(s[info.ab])||10);
  return Math.max(1,mod+Math.ceil(level/info.div));
}
function autoFillSpellSlots(idx,resetAll){
  if(idx<0||!_chars[idx])return;
  const c=_chars[idx];
  const level=Math.min(parseInt(c.level)||1,20);
  let targets=[0,0,0,0,0,0,0,0,0];
  const fullCasters=['Bard','Cleric','Druid','Sorcerer','Wizard'];
  const halfCasters=['Paladin','Ranger'];
  if(fullCasters.includes(c.class)){
    targets=FULL_CASTER_SLOTS[level-1];
  }else if(halfCasters.includes(c.class)){
    targets=HALF_CASTER_SLOTS[level-1];
  }else if(c.class==='Warlock'){
    const[cnt,slotLv]=WARLOCK_SLOTS[level-1];
    targets=[0,0,0,0,0,0,0,0,0];
    targets[slotLv-1]=cnt;
  }else if(resetAll){
    if(!c.spellSlots)c.spellSlots={};
    for(let lv=1;lv<=9;lv++)c.spellSlots[lv]=[];
    saveStorage(_chars);return;
  }else{return;}
  if(!c.spellSlots)c.spellSlots={};
  for(let lv=1;lv<=9;lv++){
    const target=targets[lv-1];
    if(resetAll){
      c.spellSlots[lv]=Array(target).fill(true);
    }else{
      const cur=c.spellSlots[lv]||[];
      if(target>cur.length)c.spellSlots[lv]=[...cur,...Array(target-cur.length).fill(true)];
      else c.spellSlots[lv]=cur.slice(0,target);
    }
  }
  saveStorage(_chars);
}
function applyClassDefaults(idx,cls){
  if(idx<0||!_chars[idx])return;
  const cd=CLASS_DATA[cls];if(!cd)return;
  const bgSks=_chars[idx].bgSkills||[];
  const prev=_chars[idx].classSkillPicks||[];
  prev.forEach(sk=>{if(!bgSks.includes(sk)&&_chars[idx].skillProfs)delete _chars[idx].skillProfs[sk];});
  _chars[idx].classSkillPicks=[];
  _chars[idx].savingThrows={STR:false,DEX:false,CON:false,INT:false,WIS:false,CHA:false};
  cd.saves.forEach(ab=>_chars[idx].savingThrows[ab]=true);
  _chars[idx].hitDice=cd.hd;
  if(CLASS_SPELL_ABILITY[cls])_chars[idx].spellcastingAbility=CLASS_SPELL_ABILITY[cls];
  autoFillSpellSlots(idx,true);
  saveStorage(_chars);
}
function applyBackgroundDefaults(idx,bg){
  if(idx<0||!_chars[idx])return;
  const bd=BACKGROUND_DATA[bg];if(!bd)return;
  const c=_chars[idx];
  if(!c.skillProfs)c.skillProfs={};
  const prevSk=c.bgSkills||[];
  const classPicks=c.classSkillPicks||[];
  prevSk.forEach(sk=>{if(!classPicks.includes(sk))delete c.skillProfs[sk];});
  c.bgSkills=bd.skills;
  bd.skills.forEach(sk=>c.skillProfs[sk]=true);
  // Undo previous ability bonuses and reset
  const prevAb=c.bgAbilityApplied||{};
  Object.entries(prevAb).forEach(([ab,n])=>{c[ab]=(parseInt(c[ab])||10)-n;});
  c.bgAbilityApplied={};
  c.bgAbilityMode='2+1';
  c.bgAbilityPicks=bd.abilityDefault?[...bd.abilityDefault]:[];
  c.bgEquipChoice='';c.bgEquipApplied=false;
  saveStorage(_chars);
  // Auto-apply suggested ability scores immediately
  applyBgAbilityBonus(idx);
}
function applyBgAbilityBonus(idx){
  if(idx<0||!_chars[idx])return;
  const c=_chars[idx];
  const prev=c.bgAbilityApplied||{};
  Object.entries(prev).forEach(([ab,n])=>{c[ab]=(parseInt(c[ab])||10)-n;});
  c.bgAbilityApplied={};
  const mode=c.bgAbilityMode||'2+1';
  const picks=c.bgAbilityPicks||[];
  if(mode==='2+1'){
    if(picks[0]){c[picks[0]]=(parseInt(c[picks[0]])||10)+2;c.bgAbilityApplied[picks[0]]=2;}
    if(picks[1]&&picks[1]!==picks[0]){c[picks[1]]=(parseInt(c[picks[1]])||10)+1;c.bgAbilityApplied[picks[1]]=1;}
  }else{
    const seen=new Set();
    picks.filter(a=>a&&!seen.has(a)&&seen.add(a)).forEach(ab=>{c[ab]=(parseInt(c[ab])||10)+1;c.bgAbilityApplied[ab]=1;});
  }
  saveStorage(_chars);
}
function setBgAbilityMode(mode){
  if(_idx<0)return;

  const prev=c.bgAbilityApplied||{};
  Object.entries(prev).forEach(([ab,n])=>{c[ab]=(parseInt(c[ab])||10)-n;});
  c.bgAbilityApplied={};c.bgAbilityMode=mode;c.bgAbilityPicks=[];
  saveStorage(_chars);renderContent();buildPrintSheet();
}

}

}
function syncSpeciesSpells(idx){
  if(idx<0||!_chars[idx])return;
  const c=_chars[idx];const level=parseInt(c.level)||1;
  const pool=[...(c.speciesLevelSpellPool||[]),...(c.speciesSubLevelSpellPool||[])];
  const poolNames=pool.map(s=>s.name);
  if(c.spellList)c.spellList=c.spellList.filter(s=>!poolNames.includes(s));
  if(!c.spellList)c.spellList=[];
  pool.forEach(s=>{if(level>=s.minLevel&&!c.spellList.includes(s.name))c.spellList.push(s.name);});
  saveStorage(_chars);

function setSpeciesSkillChoice(skill){
  if(_idx<0)return;
  const c=_chars[_idx];

  if(prev&&!bgSks.includes(prev)&&!classPicks.includes(prev)&&!(c.speciesSkills||[]).includes(prev)){
    if(c.skillProfs)delete c.skillProfs[prev];
  }
  c.speciesSkillChoice=skill;
  if(skill){if(!c.skillProfs)c.skillProfs={};c.skillProfs[skill]=true;}

}
function applySpeciesDefaults(idx,sp){
  if(idx<0||!_chars[idx])return;
  const c=_chars[idx];
  const bgSks=c.bgSkills||[];const classPicks=c.classSkillPicks||[];
  // undo previous species + subrace skills
  [...(c.speciesSkills||[]),...(c.speciesSubSkills||[])].forEach(sk=>{
    if(!bgSks.includes(sk)&&!classPicks.includes(sk)){if(c.skillProfs)delete c.skillProfs[sk];}
  });
  // undo skill choice
  const prev=c.speciesSkillChoice||'';
  if(prev&&!bgSks.includes(prev)&&!classPicks.includes(prev)){if(c.skillProfs)delete c.skillProfs[prev];}
  c.speciesSkillChoice='';
  // undo cantrips and level spells
  const prevCantrips=[...(c.speciesCantrips||[]),...(c.speciesSubCantrips||[])];
  const prevLvNames=[...(c.speciesLevelSpellPool||[]),...(c.speciesSubLevelSpellPool||[])].map(s=>s.name);
  if(c.spellList)c.spellList=c.spellList.filter(s=>!prevCantrips.includes(s)&&!prevLvNames.includes(s));
  // reset subrace state
  c.subrace='';
  c.speciesSubFeatures=[];c.speciesSubSkills=[];c.speciesSubCantrips=[];c.speciesSubLevelSpellPool=[];
  const sd=SPECIES_DATA[sp];
  if(!sd){
    c.speed='30 ft';c.speciesFeatures=[];c.speciesSkills=[];c.speciesCantrips=[];c.speciesLevelSpellPool=[];
    saveStorage(_chars);return;
  }
  c.speed=sd.speed||'30 ft';
  c.speciesFeatures=[...(sd.features||[])];
  c.speciesSkills=[...(sd.skills||[])];
  c.speciesCantrips=[...(sd.cantrips||[])];
  c.speciesLevelSpellPool=[...(sd.levelSpells||[])];
  if(!c.skillProfs)c.skillProfs={};
  (sd.skills||[]).forEach(sk=>c.skillProfs[sk]=true);
  if(!c.spellList)c.spellList=[];
  (sd.cantrips||[]).forEach(ct=>{if(!c.spellList.includes(ct))c.spellList.push(ct);});
  syncSpeciesSpells(idx);
  saveStorage(_chars);
}
function applySubraceDefaults(idx,sr){

  const c=_chars[idx];

  const bgSks=c.bgSkills||[];const classPicks=c.classSkillPicks||[];
  // undo previous subrace skills, cantrips, level spells
  (c.speciesSubSkills||[]).forEach(sk=>{
    if(!bgSks.includes(sk)&&!classPicks.includes(sk)&&!(c.speciesSkills||[]).includes(sk)){if(c.skillProfs)delete c.skillProfs[sk];}
  });
  const prevSubCantrips=c.speciesSubCantrips||[];
  const prevSubLvNames=(c.speciesSubLevelSpellPool||[]).map(s=>s.name);
  if(c.spellList)c.spellList=c.spellList.filter(s=>!prevSubCantrips.includes(s)&&!prevSubLvNames.includes(s));
  c.speciesSubFeatures=[];c.speciesSubSkills=[];c.speciesSubCantrips=[];c.speciesSubLevelSpellPool=[];
  if(sd)c.speed=sd.speed||'30 ft';
  if(!sd||!sr||!sd.subraces||!sd.subraces[sr]){saveStorage(_chars);return;}
  const srd=sd.subraces[sr];
  if(srd.speed)c.speed=srd.speed;
  c.speciesSubFeatures=[...(srd.features||[])];
  c.speciesSubSkills=[...(srd.skills||[])];
  c.speciesSubCantrips=[...(srd.cantrips||[])];
  c.speciesSubLevelSpellPool=[...(srd.levelSpells||[])];
  if(!c.skillProfs)c.skillProfs={};
  (srd.skills||[]).forEach(sk=>c.skillProfs[sk]=true);
  if(!c.spellList)c.spellList=[];
  (srd.cantrips||[]).forEach(ct=>{if(!c.spellList.includes(ct))c.spellList.push(ct);});
  syncSpeciesSpells(idx);
  saveStorage(_chars);
}

/* ════════ CHARACTER ACTIONS ════════ */
function newCharacter(){const c=blankChar();_chars.push(c);_idx=_chars.length-1;saveStorage(_chars);renderAll();}
function saveCharacter(){saveStorage(_chars);showToast('Saved!');}
function duplicateCharacter(){if(_idx<0)return;const c=JSON.parse(JSON.stringify(_chars[_idx]));c.id=Date.now();c.name+=' (Copy)';_chars.push(c);_idx=_chars.length-1;saveStorage(_chars);renderAll();}
function deleteCharacter(){if(_idx<0||!confirm('Delete this character?'))return;_chars.splice(_idx,1);_idx=_chars.length>0?0:-1;saveStorage(_chars);renderAll();}
function exportCharacter(){const s=getS();if(!s.id)return;const b=new Blob([JSON.stringify(s,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=(s.name||'character').replace(/\s/g,'_')+'.json';a.click();}
function importCharacter(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const c=JSON.parse(ev.target.result);c.id=Date.now();_chars.push(c);_idx=_chars.length-1;saveStorage(_chars);renderAll();}catch(err){alert('Invalid JSON file.');}};r.readAsText(f);};inp.click();}
function selectChar(i){_idx=i;renderAll();}

/* ════════ FIELD UPDATES ════════ */
function upd(field,val){if(_idx<0)return;_chars[_idx][field]=val;saveStorage(_chars);}
function updNested(obj,key,val){if(_idx<0)return;if(!_chars[_idx][obj])_chars[_idx][obj]={};_chars[_idx][obj][key]=val;saveStorage(_chars);}
function updArr(arr,i,key,val){if(_idx<0)return;if(!_chars[_idx][arr])_chars[_idx][arr]=[];while(_chars[_idx][arr].length<=i)_chars[_idx][arr].push({});_chars[_idx][arr][i][key]=val;saveStorage(_chars);}

let _tab='core';

function renderSpells(s){
  const cls=s.class;const spData=SPELL_LISTS[cls];
  const pb=getPB(s.level);
  const spAbMod=s.spellcastingAbility?getMod(parseInt(s[s.spellcastingAbility])||10):0;
  const spellList=s.spellList||[];
  const preparedSpells=s.preparedSpells||[];
  const prepLimit=getPreparedLimit(s);
  const isPrepCaster=prepLimit!==null;
  // Build cantrip lookup from all class lists + species
  const cantripSet=new Set();
  Object.values(SPELL_LISTS).forEach(c=>(c.cantrips||[]).forEach(n=>cantripSet.add(n)));
  Object.values(SPECIES_DATA).forEach(sp=>{(sp.cantrips||[]).forEach(n=>cantripSet.add(n));Object.values(sp.subraces||{}).forEach(sr=>(sr.cantrips||[]).forEach(n=>cantripSet.add(n)));});
  const isCntrp=n=>cantripSet.has(n);
  const knownCantrips=spellList.filter(isCntrp);
  const knownLeveled=spellList.filter(n=>!isCntrp(n));
  const prepLeveled=preparedSpells.filter(n=>!isCntrp(n));
  const prepCount=prepLeveled.length;
  const atLimit=isPrepCaster&&prepCount>=(prepLimit||0);
  // Slot HTML
  const slotHtml=[1,2,3,4,5,6,7,8,9].map(lv=>{
    const slots=s.spellSlots&&s.spellSlots[lv]||[];
    return`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;"><span style="font-size:0.65rem;color:var(--ink3);min-width:38px;font-variant:small-caps;">Lv ${lv}</span><div style="display:flex;gap:3px;flex-wrap:wrap;">${slots.map((used,i)=>`<div class="ss-slot${!used?' used':''}" onclick="toggleSS(${lv},${i})"></div>`).join('')}</div><button style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:0.8rem;" onclick="addSS(${lv})">+</button>${slots.length?`<button style="background:none;border:none;color:var(--blood);cursor:pointer;font-size:0.8rem;" onclick="rmSS(${lv})">−</button>`:''}</div>`;
  }).join('');
  // Known spells row builder
  const mkRow=(sp,showCheck)=>{
    const esp=sp.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const prepared=preparedSpells.includes(sp);
    const disabled=showCheck&&!prepared&&atLimit;
    return`<div style="display:flex;align-items:center;gap:5px;padding:2px 0;border-bottom:1px solid rgba(139,105,20,0.1);">${showCheck?`<input type="checkbox" data-prep="${esc(sp)}" ${prepared?'checked':''} ${disabled?'disabled':''} style="accent-color:var(--blood);width:12px;height:12px;flex-shrink:0;cursor:${disabled?'not-allowed':'pointer'};" title="${disabled?'Preparation limit reached — unprepare a spell first':'Toggle prepared'}">`:''}<span style="flex:1;font-size:0.8rem;${showCheck&&prepared?'color:var(--accent);font-weight:600;':''}">${esc(sp)}</span><span style="cursor:pointer;color:var(--blood);font-size:0.75rem;padding:0 3px;line-height:1;" onclick="toggleSpell('${esp}')" title="Remove from known">✕</span></div>`;
  };
  // Known spells section
  let knownHtml='';
  if(!spellList.length){
    knownHtml=`<p style="font-size:0.78rem;color:var(--ink3);font-style:italic;">No spells added yet. Use the Spell Picker →</p>`;
  }else{
    if(knownCantrips.length){
      knownHtml+=`<div style="font-size:0.6rem;color:var(--ink3);font-variant:small-caps;letter-spacing:0.07em;margin:3px 0 2px;">Cantrips</div>`;
      knownHtml+=knownCantrips.map(sp=>mkRow(sp,false)).join('');
    }
    if(knownLeveled.length){
      knownHtml+=`<div style="font-size:0.6rem;color:var(--ink3);font-variant:small-caps;letter-spacing:0.07em;margin:${knownCantrips.length?'8px':'3px'} 0 2px;">Leveled Spells${isPrepCaster?' — check to prepare':' — all prepared'}</div>`;
      knownHtml+=knownLeveled.map(sp=>mkRow(sp,isPrepCaster)).join('');
    }
  }
  // Prepared spells panel (prepared casters only)
  let prepPanel='';
  if(isPrepCaster){
    const over=prepCount>prepLimit,exact=prepCount===prepLimit;
    const hdrStyle=over?'color:var(--blood);':exact?'color:var(--accent);':'';
    let prepBody=prepLeveled.length
      ?prepLeveled.map(sp=>{const esp=sp.replace(/\\/g,'\\\\').replace(/'/g,"\\'");return`<div style="display:flex;align-items:center;gap:5px;padding:2px 0;border-bottom:1px solid rgba(139,105,20,0.1);"><span style="flex:1;font-size:0.8rem;color:var(--accent);font-weight:600;">${esc(sp)}</span><span style="cursor:pointer;color:var(--blood);font-size:0.75rem;padding:0 3px;line-height:1;" onclick="togglePrepare('${esp}')" title="Unprepare">✕</span></div>`;}).join('')
      :`<p style="font-size:0.78rem;color:var(--ink3);font-style:italic;">No spells prepared yet.</p>`;
    prepPanel=`<div class="panel"><div class="ptitle" style="${hdrStyle}">Prepared Spells — ${prepCount} / ${prepLimit}</div>${prepBody}</div>`;
  }
  // Spell Picker
  const pickerHtml=spData?`
    ${spData.cantrips&&spData.cantrips.length?`<div style="margin-bottom:8px;"><div style="font-size:0.65rem;color:var(--accent);font-variant:small-caps;letter-spacing:0.08em;margin-bottom:4px;">Cantrips</div><div>${spData.cantrips.map(sp=>`<span class="tag${spellList.includes(sp)?' on':''}" onclick="toggleSpell('${sp.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${esc(sp)}</span>`).join('')}</div></div>`:''}
    <div style="margin-bottom:8px;"><div style="font-size:0.65rem;color:var(--accent);font-variant:small-caps;letter-spacing:0.08em;margin-bottom:4px;">1st Level</div><div>${spData[1].map(sp=>`<span class="tag${spellList.includes(sp)?' on':''}" onclick="toggleSpell('${sp.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${esc(sp)}</span>`).join('')}</div></div>
    <div><div style="font-size:0.65rem;color:var(--accent);font-variant:small-caps;letter-spacing:0.08em;margin-bottom:4px;">2nd Level</div><div>${spData[2].map(sp=>`<span class="tag${spellList.includes(sp)?' on':''}" onclick="toggleSpell('${sp.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${esc(sp)}</span>`).join('')}</div></div>`
    :`<p style="font-size:0.8rem;color:var(--ink3);font-style:italic;text-align:center;padding:1rem;">Select a spellcasting class on the Core tab to see available spells.</p>`;
  const abOpts=ABS.map(a=>`<option${s.spellcastingAbility===a?' selected':''}>${a}</option>`).join('');
  return`<div class="pg-title">Spells &amp; Magic</div>
<div class="pg pg21">
  <div style="display:flex;flex-direction:column;gap:0.75rem;">
    <div class="panel"><div class="ptitle">Spellcasting Stats</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px;">
        <div><label class="fl">Ability</label><select class="fi" data-f="spellcastingAbility"><option value="">—</option>${abOpts}</select></div>
        <div class="big-stat has-tip"><div class="big-num" style="font-size:1.3rem;">${8+pb+spAbMod}</div><div class="big-lbl">Save DC</div><span class="tip">${esc(`8 base + Prof +${pb} + ${s.spellcastingAbility||'ability'} ${modStr(spAbMod)} = ${8+pb+spAbMod}`)}</span></div>
        <div class="big-stat has-tip"><div class="big-num" style="font-size:1.3rem;">${modStr(pb+spAbMod)}</div><div class="big-lbl">Spell Atk</div><span class="tip">${esc(`Prof +${pb} + ${s.spellcastingAbility||'ability'} ${modStr(spAbMod)} = ${modStr(pb+spAbMod)}`)}</span></div>
      </div>
    </div>
    <div class="panel"><div class="ptitle">Spell Slots</div>${slotHtml}</div>
    <div class="panel"><div class="ptitle">Known Spells${spellList.length?` (${spellList.length})`:''}</div>${knownHtml}</div>
    ${prepPanel}
  </div>
  <div class="panel"><div class="ptitle">Spell Picker — ${esc(cls||'Choose a Class')}</div>${pickerHtml}</div>
</div>`;
}

/* ════════ EVENT BINDING ════════ */
function bindListeners(){
  document.querySelectorAll('[data-f]').forEach(el=>{
    el.addEventListener('change',function(){
      const v=el.type==='checkbox'?el.checked:el.type==='number'?(parseInt(el.value)||0):el.value;
      upd(el.dataset.f,v);
      if(el.dataset.f==='class'&&v){applyClassDefaults(_idx,v);}
      if(el.dataset.f==='background'&&v){applyBackgroundDefaults(_idx,v);}
      if(el.dataset.f==='race'&&v){applySpeciesDefaults(_idx,v);}
      if(el.dataset.f==='subrace'){applySubraceDefaults(_idx,v);}
      if(el.dataset.f==='level'){syncSpeciesSpells(_idx);autoFillSpellSlots(_idx,false);}
      if(el.dataset.f==='name'){const pt=document.querySelector('.pg-title');if(pt)pt.textContent=v||'Unnamed Hero';}
      if(['race','subrace','class','background','level','spellcastingAbility','STR','DEX','CON','INT','WIS','CHA','armorName','shield'].includes(el.dataset.f))renderContent();
      if(['name','race','class'].includes(el.dataset.f))renderSidebar();
      buildPrintSheet();
    });
  });
  document.querySelectorAll('[data-st]').forEach(cb=>cb.addEventListener('change',()=>{updNested('savingThrows',cb.dataset.st,cb.checked);renderContent();buildPrintSheet();}));
  document.querySelectorAll('[data-skp]').forEach(cb=>cb.addEventListener('change',()=>{updNested('skillProfs',cb.dataset.skp,cb.checked);renderContent();buildPrintSheet();}));
  document.querySelectorAll('[data-skx]').forEach(cb=>cb.addEventListener('change',()=>{updNested('skillProfs',cb.dataset.skx+'_exp',cb.checked);renderContent();buildPrintSheet();}));
  document.querySelectorAll('[data-csk]').forEach(cb=>cb.addEventListener('change',()=>{
    if(_idx<0)return;
    if(!_chars[_idx].classSkillPicks)_chars[_idx].classSkillPicks=[];
    const sk=cb.dataset.csk;
    if(cb.checked){
      if(!_chars[_idx].classSkillPicks.includes(sk))_chars[_idx].classSkillPicks.push(sk);
      updNested('skillProfs',sk,true);
    }else{
      const i=_chars[_idx].classSkillPicks.indexOf(sk);if(i>=0)_chars[_idx].classSkillPicks.splice(i,1);
      const bgSks=_chars[_idx].bgSkills||[];
      if(!bgSks.includes(sk)){if(_chars[_idx].skillProfs)delete _chars[_idx].skillProfs[sk];saveStorage(_chars);}
    }
    renderContent();buildPrintSheet();
  }));
  document.querySelectorAll('[data-ai]').forEach(el=>el.addEventListener('change',()=>{updArr('attacks',parseInt(el.dataset.ai),el.dataset.af,el.value);buildPrintSheet();}));
  document.querySelectorAll('[data-cr]').forEach(el=>el.addEventListener('change',()=>{updNested('currency',el.dataset.cr,parseInt(el.value)||0);buildPrintSheet();}));
  document.querySelectorAll('[data-dss]').forEach(pip=>pip.addEventListener('click',()=>{
    if(_idx<0)return;if(!_chars[_idx].deathSuccesses)_chars[_idx].deathSuccesses=[false,false,false];
    _chars[_idx].deathSuccesses[pip.dataset.dss]=!_chars[_idx].deathSuccesses[pip.dataset.dss];
    pip.classList.toggle('on');saveStorage(_chars);buildPrintSheet();
  }));
  document.querySelectorAll('[data-dsf]').forEach(pip=>pip.addEventListener('click',()=>{
    if(_idx<0)return;if(!_chars[_idx].deathFails)_chars[_idx].deathFails=[false,false,false];
    _chars[_idx].deathFails[pip.dataset.dsf]=!_chars[_idx].deathFails[pip.dataset.dsf];
    pip.classList.toggle('on');saveStorage(_chars);buildPrintSheet();
  }));
  document.querySelectorAll('[data-prep]').forEach(cb=>cb.addEventListener('change',()=>{togglePrepare(cb.dataset.prep);}));
}

function toggleInsp(){if(_idx<0)return;_chars[_idx].inspiration=!_chars[_idx].inspiration;saveStorage(_chars);const b=document.getElementById('inspBtn');if(b)b.classList.toggle('on',_chars[_idx].inspiration);buildPrintSheet();}
function addAtk(){if(_idx<0)return;if(!_chars[_idx].attacks)_chars[_idx].attacks=[];_chars[_idx].attacks.push({name:'',bonus:'',dmg:'',type:''});saveStorage(_chars);renderContent();}
function toggleSS(lv,i){if(_idx<0)return;const ss=_chars[_idx].spellSlots;if(!ss[lv])ss[lv]=[];ss[lv][i]=!ss[lv][i];saveStorage(_chars);renderContent();}
function addSS(lv){if(_idx<0)return;const ss=_chars[_idx].spellSlots;if(!ss[lv])ss[lv]=[];ss[lv].push(true);saveStorage(_chars);renderContent();}
function rmSS(lv){if(_idx<0)return;const ss=_chars[_idx].spellSlots;if(!ss[lv]||!ss[lv].length)return;ss[lv].pop();saveStorage(_chars);renderContent();}
function toggleSpell(name){if(_idx<0)return;const sl=_chars[_idx].spellList=_chars[_idx].spellList||[];const i=sl.indexOf(name);if(i>=0){sl.splice(i,1);const ps=_chars[_idx].preparedSpells;if(ps){const pi=ps.indexOf(name);if(pi>=0)ps.splice(pi,1);}}else sl.push(name);saveStorage(_chars);renderContent();}
function togglePrepare(name){if(_idx<0)return;if(!_chars[_idx].preparedSpells)_chars[_idx].preparedSpells=[];const ps=_chars[_idx].preparedSpells;const i=ps.indexOf(name);if(i>=0)ps.splice(i,1);else ps.push(name);saveStorage(_chars);renderContent();}
function addCustomFeat(){const n=document.getElementById('cfN'),d=document.getElementById('cfD'),src=document.getElementById('cfS');if(!n||!n.value.trim())return;if(!_chars[_idx].customFeatures)_chars[_idx].customFeatures=[];_chars[_idx].customFeatures.push({name:n.value.trim(),desc:d?d.value.trim():'',source:src?src.value.trim():''});saveStorage(_chars);renderContent();buildPrintSheet();}
function rmCustomFeat(i){if(_idx<0)return;_chars[_idx].customFeatures.splice(i,1);saveStorage(_chars);renderContent();buildPrintSheet();}

/* ════════ PRINT SHEET ════════ */
function buildPrintSheet(){
  const el=document.getElementById('print-sheet');if(!el)return;
  const s=getS();if(!s.id){el.innerHTML='';return;}
  const pb=getPB(s.level);
  const abMod=ab=>getMod(parseInt(s[ab])||10);
  const skBonus=sk=>{const m=abMod(sk.a),p=s.skillProfs&&s.skillProfs[sk.n],x=s.skillProfs&&s.skillProfs[sk.n+'_exp'];return m+(x?pb*2:p?pb:0);};
  const savBonus=ab=>{const m=abMod(ab),p=s.savingThrows&&s.savingThrows[ab];return m+(p?pb:0);};
  const dot=on=>`<span class="ps-dot${on?' on':''}"></span>`;
  const pip=on=>`<span class="ps-pip${on?' on':''}"></span>`;
  const cur=s.currency||{cp:0,sp:0,ep:0,gp:0,pp:0};
  const atks=[...(s.attacks||[])];while(atks.length<3)atks.push({name:'',bonus:'',dmg:'',type:''});
  const feats=[
    ...(s.speciesFeatures||[]),
    ...(s.speciesSubFeatures||[]),
    ...(CLASS_FEATURES[s.class]||[]).filter(f=>f.lv<=(s.level||1)),
    ...(s.customFeatures||[]).map(f=>({n:f.name,d:f.desc}))
  ];
  const spAbMod=s.spellcastingAbility?abMod(s.spellcastingAbility):0;
  const psAC=calcAC(s).ac,psInit=calcInit(s).init;

  el.innerHTML=`
<div class="ps-name-bar">${esc(s.name)||'Unnamed Hero'}</div>
<div class="ps-hdr-row">
  <div class="ps-hdr-field"><div class="ps-hdr-val">${esc(s.class||'')}${s.class?' ':''} ${s.level||1}</div><div class="ps-hdr-lbl">Class &amp; Level</div></div>
  <div class="ps-hdr-field"><div class="ps-hdr-val">${esc(s.background||'')}</div><div class="ps-hdr-lbl">Background</div></div>
  <div class="ps-hdr-field"><div class="ps-hdr-val">${esc([s.race,s.subrace].filter(Boolean).join(' '))}</div><div class="ps-hdr-lbl">Species</div></div>
  <div class="ps-hdr-field"><div class="ps-hdr-val">${esc(s.alignment||'')}</div><div class="ps-hdr-lbl">Alignment</div></div>
  <div class="ps-hdr-field"><div class="ps-hdr-val">${s.xp||0}</div><div class="ps-hdr-lbl">Experience Points</div></div>
</div>

<div class="ps-body">

  <!-- LEFT COLUMN: abilities, saves, skills -->
  <div>
    <div class="ps-ab-grid">
      ${ABS.map(ab=>`<div class="ps-ab">
        <div class="ps-ab-label">${AB_NAMES[ab]}</div>
        <div class="ps-ab-mod">${modStr(abMod(ab))}</div>
        <div class="ps-ab-score">${parseInt(s[ab])||10}</div>
      </div>`).join('')}
    </div>
    <div class="ps-insp-prof">
      <div class="ps-stat-box"><div class="ps-stat-val">${s.inspiration?'✦':''}</div><div class="ps-stat-lbl">Inspiration</div></div>
      <div class="ps-stat-box"><div class="ps-stat-val">+${pb}</div><div class="ps-stat-lbl">Proficiency Bonus</div></div>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Saving Throws</div>
      <div class="ps-sect-body">
        ${ABS.map(ab=>`<div class="ps-prow">${dot(s.savingThrows&&s.savingThrows[ab])}<span class="ps-prow-mod">${modStr(savBonus(ab))}</span><span class="ps-prow-name">${AB_NAMES[ab]}</span></div>`).join('')}
      </div>
    </div>
    <div class="ps-passive-row">
      <span class="ps-passive-val">${10+abMod('WIS')+(s.skillProfs&&s.skillProfs['Perception']?pb:0)}</span>
      <span class="ps-passive-lbl">Passive Wisdom (Perception)</span>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Skills</div>
      <div class="ps-sect-body">
        ${SKILLS.map(sk=>`<div class="ps-prow">${dot(s.skillProfs&&(s.skillProfs[sk.n]||s.skillProfs[sk.n+'_exp']))}<span class="ps-prow-mod">${modStr(skBonus(sk))}</span><span class="ps-prow-name">${sk.n}</span><span class="ps-prow-attr">(${sk.a})</span></div>`).join('')}
      </div>
    </div>
  </div>

  <!-- MIDDLE COLUMN: combat, HP, attacks, equipment -->
  <div>
    <div class="ps-cstat-row">
      <div class="ps-cstat"><div class="ps-cstat-val">${psAC}</div><div class="ps-cstat-lbl">Armor Class</div></div>
      <div class="ps-cstat"><div class="ps-cstat-val">${modStr(psInit)}</div><div class="ps-cstat-lbl">Initiative</div></div>
      <div class="ps-cstat"><div class="ps-cstat-val" style="font-size:9pt;padding-top:3pt;">${esc(s.speed||'30 ft')}</div><div class="ps-cstat-lbl">Speed</div></div>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Hit Points</div>
      <div class="ps-hp-row">
        <div class="ps-hp-cell"><div class="ps-hp-val">${s.maxHp||''}</div><div class="ps-hp-lbl">Maximum HP</div></div>
        <div class="ps-hp-cell"><div class="ps-hp-val">${s.hp||''}</div><div class="ps-hp-lbl">Current HP</div></div>
        <div class="ps-hp-cell"><div class="ps-hp-val">${s.tempHp||''}</div><div class="ps-hp-lbl">Temporary HP</div></div>
      </div>
    </div>
    <div class="ps-hd-ds-row">
      <div class="ps-sect">
        <div class="ps-sect-title">Hit Dice</div>
        <div class="ps-sect-body" style="text-align:center;font-family:Georgia,serif;font-size:11pt;font-weight:bold;min-height:20pt;">${esc(s.hitDice||'')}</div>
      </div>
      <div class="ps-sect">
        <div class="ps-sect-title">Death Saving Throws</div>
        <div class="ps-ds-row">
          <div class="ps-ds-col"><div class="ps-ds-lbl">Successes</div><div class="ps-ds-pips">${[0,1,2].map(i=>pip(s.deathSuccesses&&s.deathSuccesses[i])).join('')}</div></div>
          <div class="ps-ds-col"><div class="ps-ds-lbl">Failures</div><div class="ps-ds-pips">${[0,1,2].map(i=>pip(s.deathFails&&s.deathFails[i])).join('')}</div></div>
        </div>
      </div>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Attacks &amp; Spellcasting</div>
      <div style="padding:3pt 0 2pt;">
        <div class="ps-atk-hdr"><span>Name</span><span>Atk Bonus</span><span>Damage / Type</span></div>
        ${atks.slice(0,6).map(a=>`<div class="ps-atk-row"><div class="ps-atk-cell">${esc(a.name||'')}</div><div class="ps-atk-cell">${esc(a.bonus||'')}</div><div class="ps-atk-cell">${esc([(a.dmg||''),(a.type||'')].filter(Boolean).join(' '))}</div></div>`).join('')}
      </div>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Equipment</div>
      <div class="ps-sect-body">
        <div class="ps-coin-row">${['cp','sp','ep','gp','pp'].map(c=>`<div class="ps-coin"><div class="ps-coin-val">${cur[c]||''}</div><div class="ps-coin-lbl">${c.toUpperCase()}</div></div>`).join('')}</div>
        <div class="ps-equip-text">${esc(s.equipment||'')}</div>
      </div>
    </div>
    ${s.spellcastingAbility?`<div class="ps-cstat-row"><div class="ps-cstat"><div class="ps-cstat-val" style="font-size:9pt;padding-top:3pt;">${esc(s.spellcastingAbility)}</div><div class="ps-cstat-lbl">Spellcasting Ability</div></div><div class="ps-cstat"><div class="ps-cstat-val">${8+pb+spAbMod}</div><div class="ps-cstat-lbl">Spell Save DC</div></div><div class="ps-cstat"><div class="ps-cstat-val">${modStr(pb+spAbMod)}</div><div class="ps-cstat-lbl">Spell Atk Bonus</div></div></div>`:''}
  </div>

  <!-- RIGHT COLUMN: personality, features, proficiencies -->
  <div>
    <div class="ps-sect">
      <div class="ps-sect-title">Character Traits</div>
      <div class="ps-sect-body">
        <div class="ps-trait"><div class="ps-trait-lbl">Personality Traits</div><div class="ps-trait-val">${esc(s.personalityTraits||'')}</div></div>
        <div class="ps-trait"><div class="ps-trait-lbl">Ideals</div><div class="ps-trait-val">${esc(s.ideals||'')}</div></div>
        <div class="ps-trait"><div class="ps-trait-lbl">Bonds</div><div class="ps-trait-val">${esc(s.bonds||'')}</div></div>
        <div class="ps-trait"><div class="ps-trait-lbl">Flaws</div><div class="ps-trait-val">${esc(s.flaws||'')}</div></div>
      </div>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Features &amp; Traits</div>
      <div class="ps-sect-body">
        ${feats.length?feats.map(f=>`<div class="ps-feat"><div class="ps-feat-name">${esc(f.n||f.name||'')}</div><div class="ps-feat-desc">${esc(f.d||f.desc||'')}</div></div>`).join(''):'<div style="font-size:6.5pt;color:#666;font-style:italic;">Select a class to populate features.</div>'}
      </div>
    </div>
    <div class="ps-sect">
      <div class="ps-sect-title">Proficiencies &amp; Languages</div>
      <div class="ps-sect-body">
        <div style="font-size:6.5pt;line-height:1.5;white-space:pre-wrap;">${esc([s.languages,s.proficiencies].filter(Boolean).join('\n'))}</div>
      </div>
    </div>
  </div>

</div>`;
}

function showToast(msg){
  const t=document.createElement('div');t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'16px',right:'16px',background:'#1a0800',border:'1px solid var(--gold)',color:'var(--gold2)',fontFamily:"'Cinzel',serif",fontSize:'0.72rem',padding:'7px 14px',borderRadius:'3px',zIndex:'9999',letterSpacing:'0.08em',transition:'opacity 0.3s'});
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},1800);
}

/* ════════ INIT ════════ */
(function(){
  const stored=loadStorage();
  if(stored&&stored.length>0){_chars=stored;_idx=0;}
  else{newCharacter();return;}
  renderAll();
})();
</script>
</body>
