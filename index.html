<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dyrynos — D&D 2024 Character Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --parch:#f5edd6;--parch2:#ede0bc;--parch3:#e0cfa0;
  --ink:#1a1208;--ink2:#3d2b0e;--ink3:#6b4c1e;
  --blood:#8b1a1a;--gold:#b8860b;--gold2:#d4a017;
  --accent:#5a1e1e;--border:#8b6914;
}
body{font-family:'Crimson Pro',Georgia,serif;background:#1a0e05;color:var(--ink);min-height:100vh;}

/* ── APP SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:0.5rem 1rem;background:#120800;border-bottom:1.5px solid var(--gold);flex-shrink:0;}
header h1{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold2);letter-spacing:0.1em;}
header p{font-size:0.7rem;color:#a08040;font-style:italic;}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap;}
.hdr-btn{background:rgba(139,105,20,0.12);border:1px solid var(--gold);color:var(--gold2);font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;padding:0.3rem 0.6rem;cursor:pointer;border-radius:3px;}
.hdr-btn:hover{background:rgba(139,105,20,0.28);}
.body-area{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{width:180px;min-width:180px;background:#0f0803;border-right:1px solid #3a2800;display:flex;flex-direction:column;overflow:hidden;}
@media(max-width:640px){.sidebar{width:140px;min-width:140px;}}
.sidebar-inner{flex:1;overflow-y:auto;padding:0.6rem;}
.sb-title{font-family:'Cinzel',serif;font-size:0.58rem;letter-spacing:0.15em;color:var(--gold);text-transform:uppercase;margin-bottom:0.4rem;padding-bottom:0.25rem;border-bottom:1px solid #3a2800;}
.char-item{background:rgba(180,130,20,0.06);border:1px solid #3a2800;border-radius:3px;padding:0.35rem 0.5rem;cursor:pointer;margin-bottom:3px;transition:all 0.15s;}
.char-item:hover,.char-item.active{background:rgba(180,130,20,0.18);border-color:var(--gold);}
.char-item .cn{font-size:0.8rem;color:#e8d090;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.char-item .cs{font-size:0.65rem;color:#806030;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn-new{width:100%;padding:0.4rem;background:rgba(139,26,26,0.25);border:1px solid var(--blood);color:#e09090;font-family:'Cinzel',serif;font-size:0.62rem;letter-spacing:0.08em;cursor:pointer;border-radius:3px;margin-top:0.4rem;}
.btn-new:hover{background:rgba(139,26,26,0.45);}
.sb-act{width:100%;padding:0.35rem 0.5rem;background:transparent;border:1px solid #3a2800;color:#906030;font-family:'Crimson Pro',serif;font-size:0.78rem;cursor:pointer;border-radius:2px;margin-bottom:3px;text-align:left;}
.sb-act:hover{border-color:var(--gold);color:var(--gold2);background:rgba(180,130,20,0.08);}

/* ── TAB BAR ── */
.tab-bar{display:flex;background:#0c0703;border-bottom:1px solid var(--gold);overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab-bar button{font-family:'Cinzel',serif;font-size:0.65rem;letter-spacing:0.07em;padding:0.55rem 0.9rem;background:none;border:none;color:#806030;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab-bar button:hover{color:var(--gold2);}
.tab-bar button.active{color:var(--gold2);border-bottom-color:var(--gold2);background:rgba(180,130,20,0.08);}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;background:var(--parch);padding:1rem;}

/* ── PANELS ── */
.pg{display:grid;gap:0.75rem;}
.pg2{grid-template-columns:1fr 1fr;}
.pg3{grid-template-columns:1fr 1fr 1fr;}
.pg12{grid-template-columns:1fr 2fr;}
.pg21{grid-template-columns:2fr 1fr;}
.s2{grid-column:span 2;}
.s3{grid-column:span 3;}
@media(max-width:700px){.pg2,.pg3,.pg12,.pg21{grid-template-columns:1fr;}.s2,.s3{grid-column:span 1;}}
.panel{background:rgba(255,255,255,0.32);border:1px solid var(--border);border-radius:4px;padding:0.6rem 0.7rem;position:relative;}
.panel::after{content:'';position:absolute;inset:3px;border:1px solid rgba(184,134,11,0.15);border-radius:2px;pointer-events:none;}
.ptitle{font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.12em;color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:0.5rem;padding-bottom:0.35rem;border-bottom:1px solid rgba(139,105,20,0.3);}
.pg-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--accent);text-align:center;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:2px solid rgba(139,105,20,0.25);letter-spacing:0.1em;}

/* ── FORM ELEMENTS ── */
.fi{background:rgba(255,255,255,0.5);border:1px solid rgba(139,105,20,0.45);border-radius:2px;padding:3px 6px;font-size:0.85rem;color:var(--ink);font-family:'Crimson Pro',serif;width:100%;}
.fi:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,0.75);}
select.fi{cursor:pointer;}
textarea.fi{resize:vertical;font-family:'Crimson Pro',serif;line-height:1.45;}
.fl{font-size:0.65rem;color:var(--ink3);font-variant:small-caps;letter-spacing:0.04em;margin-bottom:2px;display:block;}

/* ── ABILITY BOXES ── */
.ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
@media(max-width:400px){.ab-grid{grid-template-columns:repeat(2,1fr);}}
.ab-box{text-align:center;background:rgba(255,255,255,0.38);border:1px solid rgba(139,105,20,0.45);border-radius:4px;padding:5px 3px;}
.ab-name{font-size:0.55rem;letter-spacing:0.1em;color:var(--accent);font-variant:small-caps;}
.ab-mod{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:var(--ink2);line-height:1.1;min-height:1.4rem;}
.ab-score{width:38px;text-align:center;border:1px solid rgba(139,105,20,0.55);background:rgba(255,255,255,0.6);border-radius:2px;font-size:0.82rem;padding:1px 3px;font-family:'Crimson Pro',serif;margin-top:2px;}
.ab-score:focus{outline:none;border-color:var(--gold);}

/* ── BIG STAT ── */
.big-stat{text-align:center;background:rgba(255,255,255,0.35);border:1px solid rgba(139,105,20,0.4);border-radius:3px;padding:6px 4px;}
.big-num{font-family:'Cinzel',serif;font-size:1.6rem;font-weight:700;color:var(--ink2);line-height:1;}
.big-lbl{font-size:0.55rem;letter-spacing:0.1em;color:var(--ink3);font-variant:small-caps;margin-top:2px;}
.big-edit{width:44px;text-align:center;border:1px solid rgba(139,105,20,0.4);background:rgba(255,255,255,0.5);border-radius:2px;font-size:0.78rem;padding:2px;margin-top:3px;font-family:'Crimson Pro',serif;}
.big-edit:focus{outline:none;border-color:var(--gold);}

/* ── SKILLS ── */
.sk-row{display:flex;align-items:center;gap:4px;font-size:0.78rem;color:var(--ink2);margin-bottom:2px;}
.sk-row input[type=checkbox]{accent-color:var(--blood);width:13px;height:13px;cursor:pointer;flex-shrink:0;}
.sk-mod{font-weight:600;min-width:24px;font-size:0.76rem;color:var(--ink3);}
.sk-name{flex:1;}
.sk-attr{font-size:0.63rem;color:var(--ink3);font-style:italic;}

/* ── HP ── */
.hp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:6px;}
.hp-box{text-align:center;}
.hp-box input{width:100%;text-align:center;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:600;color:var(--ink2);background:rgba(255,255,255,0.5);border:1px solid rgba(139,105,20,0.45);border-radius:2px;padding:3px 2px;}
.hp-box input:focus{outline:none;border-color:var(--gold);}
.hp-lbl{font-size:0.55rem;color:var(--ink3);letter-spacing:0.07em;font-variant:small-caps;margin-top:2px;}

/* ── DEATH SAVES ── */
.pip{width:13px;height:13px;border-radius:50%;border:1.5px solid;cursor:pointer;display:inline-block;transition:background 0.12s;}
.pip.s{border-color:#2a7a2a;}.pip.s.on{background:#2a7a2a;}
.pip.f{border-color:var(--blood);}.pip.f.on{background:var(--blood);}

/* ── ATTACKS ── */
.atk-tbl{width:100%;border-collapse:collapse;font-size:0.8rem;}
.atk-tbl th{font-family:'Cinzel',serif;font-size:0.55rem;letter-spacing:0.1em;color:var(--accent);border-bottom:1px solid rgba(139,105,20,0.35);padding:2px 3px;text-align:left;}
.atk-tbl td{padding:2px 3px;border-bottom:1px solid rgba(139,105,20,0.12);}
.atk-tbl input{width:100%;background:transparent;border:none;border-bottom:1px dashed rgba(139,105,20,0.25);font-size:0.8rem;font-family:'Crimson Pro',serif;color:var(--ink);}
.atk-tbl input:focus{outline:none;border-bottom-color:var(--gold);}

/* ── SPELL SLOTS ── */
.ss-slot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--gold);cursor:pointer;display:inline-block;}
.ss-slot.used{background:rgba(139,26,26,0.4);border-color:var(--blood);}

/* ── CURRENCY ── */
.curr-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.curr-box{text-align:center;}
.curr-box input{width:100%;text-align:center;background:rgba(255,255,255,0.5);border:1px solid rgba(139,105,20,0.45);border-radius:2px;font-size:0.82rem;padding:2px;font-family:'Crimson Pro',serif;}
.curr-box input:focus{outline:none;border-color:var(--gold);}
.curr-lbl{font-size:0.6rem;color:var(--ink3);font-variant:small-caps;letter-spacing:0.06em;margin-top:2px;}

/* ── FEATURE CARDS ── */
.feat-card{background:rgba(255,255,255,0.28);border:1px solid rgba(139,105,20,0.35);border-radius:3px;padding:0.45rem 0.55rem;margin-bottom:0.4rem;}
.feat-card h4{font-family:'Cinzel',serif;font-size:0.72rem;color:var(--accent);margin-bottom:2px;}
.feat-card p{font-size:0.78rem;color:var(--ink2);line-height:1.4;}
.feat-meta{font-size:0.65rem;color:var(--ink3);font-style:italic;margin-top:2px;}

/* ── MISC ── */
.tag{display:inline-block;font-size:0.65rem;background:rgba(139,105,20,0.1);border:1px solid rgba(139,105,20,0.28);color:var(--ink3);border-radius:2px;padding:1px 5px;margin:2px;cursor:pointer;}
.tag.on{background:rgba(139,26,26,0.15);border-color:var(--blood);color:var(--accent);}
.btn-add{width:100%;padding:3px;background:transparent;border:1px dashed rgba(139,105,20,0.45);color:var(--ink3);font-size:0.72rem;cursor:pointer;border-radius:2px;margin-top:3px;}
.btn-add:hover{border-color:var(--gold);color:var(--ink2);}
.insp{width:20px;height:20px;border-radius:50%;border:2px solid var(--gold);background:transparent;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:0.7rem;color:transparent;transition:all 0.15s;}
.insp.on{background:var(--gold);color:var(--ink2);}
.notice{text-align:center;padding:3rem 1rem;color:var(--ink3);font-style:italic;}
.save-row{display:flex;align-items:center;gap:5px;font-size:0.8rem;margin-bottom:3px;}
.save-row input[type=checkbox]{accent-color:var(--blood);cursor:pointer;}

/* ── BACKGROUND DEFAULTS UI ── */
.eq-card{display:flex;align-items:center;justify-content:center;gap:5px;padding:5px 10px;background:rgba(255,255,255,0.35);border:1.5px solid rgba(139,105,20,0.35);border-radius:3px;cursor:pointer;font-size:0.78rem;color:var(--ink2);transition:all 0.15s;flex:1;}
.eq-card:hover{border-color:var(--gold);}
.eq-card.on{background:rgba(139,105,20,0.14);border-color:var(--gold);color:var(--ink);font-weight:600;}
.btn-apply{padding:4px 10px;background:rgba(139,26,26,0.15);border:1px solid var(--blood);color:var(--accent);font-family:'Cinzel',serif;font-size:0.6rem;letter-spacing:0.06em;cursor:pointer;border-radius:2px;margin-top:4px;}
.btn-apply:hover:not(:disabled){background:rgba(139,26,26,0.3);}
.btn-apply:disabled{opacity:0.5;cursor:not-allowed;}
.ab-pick-sel{background:rgba(255,255,255,0.55);border:1px solid rgba(139,105,20,0.45);border-radius:2px;padding:2px 4px;font-size:0.8rem;font-family:'Crimson Pro',serif;color:var(--ink);cursor:pointer;}
.ab-pick-sel:focus{outline:none;border-color:var(--gold);}

/* ── TOOLTIPS ── */
.tip-wrap{position:relative;display:inline-block;cursor:help;}
.has-tip{position:relative;cursor:help;}
.tip{display:none;position:absolute;background:#120800;border:1px solid var(--gold);color:var(--gold2);font-family:'Crimson Pro',serif;font-size:0.72rem;padding:4px 9px;border-radius:3px;white-space:nowrap;z-index:500;pointer-events:none;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);line-height:1.5;}
.tip-wrap:hover .tip,.has-tip:hover .tip{display:block;}
.tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--gold);}
/* right-pointing variant for inline list rows */
.tip-r .tip{bottom:auto;top:50%;left:calc(100% + 6px);transform:translateY(-50%);}
.tip-r .tip::after{top:50%;left:-10px;transform:translateY(-50%);border:5px solid transparent;border-right-color:var(--gold);}

/* ════════════════════════════════
   PRINT STYLES — Official 2014-style layout
   ════════════════════════════════ */
@media print {
  @page{size:letter portrait;margin:0.35in;}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:white!important;font-family:Arial,Helvetica,sans-serif;}
  .app{display:none!important;}
  #print-sheet{display:block!important;}
}
#print-sheet{display:none;}

/* ── SHEET WRAPPER ── */
#print-sheet{font-family:Arial,Helvetica,sans-serif;font-size:7pt;color:#000;width:100%;}

/* ── HEADER ── */
.ps-name-bar{background:#58180D;color:#fff;font-size:13pt;font-weight:bold;padding:3pt 8pt;letter-spacing:0.06em;margin-bottom:2pt;}
.ps-hdr-row{display:flex;border:1pt solid #58180D;margin-bottom:5pt;}
.ps-hdr-field{flex:1;padding:1.5pt 4pt;border-right:1pt solid #58180D;}
.ps-hdr-field:last-child{border-right:none;}
.ps-hdr-val{font-size:8pt;font-weight:bold;min-height:10pt;}
.ps-hdr-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.06em;border-top:0.5pt solid #58180D;margin-top:1.5pt;padding-top:1pt;}

/* ── 3-COLUMN BODY ── */
.ps-body{display:grid;grid-template-columns:1.5in 2.5in 1fr;gap:5pt;flex:1;min-height:0;overflow:hidden;}
.ps-body>div{display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── ABILITY SCORE BOXES ── */
.ps-ab-grid{display:grid;grid-template-columns:1fr 1fr;gap:3pt;margin-bottom:3pt;}
.ps-ab{border:1.5pt solid #58180D;border-radius:3pt;text-align:center;padding:2pt 2pt 3pt;}
.ps-ab-label{font-size:4pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;margin-bottom:1pt;}
.ps-ab-mod{font-family:Georgia,serif;font-size:17pt;font-weight:bold;line-height:1;margin:1pt 0;}
.ps-ab-score{border:0.75pt solid #58180D;border-radius:2pt;font-size:6.5pt;font-weight:bold;display:inline-block;padding:0.5pt 5pt;min-width:18pt;}

/* ── INSPIRATION + PROF BONUS ── */
.ps-insp-prof{display:flex;gap:3pt;margin-bottom:3pt;}
.ps-stat-box{flex:1;border:1.5pt solid #58180D;border-radius:2pt;text-align:center;padding:1.5pt 2pt;}
.ps-stat-val{font-family:Georgia,serif;font-size:12pt;font-weight:bold;line-height:1.2;min-height:13pt;}
.ps-stat-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;border-top:0.75pt solid #58180D;margin-top:1.5pt;padding-top:1pt;}

/* ── SECTION BLOCKS ── */
.ps-sect{border:1.5pt solid #58180D;border-radius:2pt;overflow:hidden;margin-bottom:3pt;}
.ps-sect-title{background:#58180D;color:#fff;font-size:5.5pt;font-weight:bold;text-transform:uppercase;letter-spacing:0.1em;padding:1.5pt 4pt;text-align:center;}
.ps-sect-body{padding:3pt 4pt;}
/* Expanding section — fills remaining column height */
.ps-sect-grow{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;margin-bottom:0;}
.ps-sect-grow>.ps-sect-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
/* 2-col fill layout for pages 2-3 */
.ps-2col-fill{display:grid;grid-template-columns:1fr 1fr;gap:5pt;flex:1;min-height:0;overflow:hidden;}
.ps-2col-fill>div{display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ── PROFICIENCY ROWS (saves/skills) ── */
.ps-prow{display:flex;align-items:center;gap:2pt;margin-bottom:1.5pt;}
.ps-dot{width:5.5pt;height:5.5pt;border-radius:50%;border:0.75pt solid #333;flex-shrink:0;display:inline-block;}
.ps-dot.on{background:#333;}
.ps-prow-mod{font-size:6pt;font-weight:bold;min-width:13pt;text-align:right;}
.ps-prow-name{font-size:5.5pt;flex:1;white-space:nowrap;}
.ps-prow-attr{font-size:4.5pt;color:#666;margin-left:1pt;}

/* ── PASSIVE PERCEPTION ── */
.ps-passive-row{display:flex;align-items:center;gap:4pt;border:1.5pt solid #58180D;border-radius:2pt;padding:2pt 4pt;margin-bottom:3pt;}
.ps-passive-val{font-family:Georgia,serif;font-size:12pt;font-weight:bold;}
.ps-passive-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;}

/* ── COMBAT STAT ROW ── */
.ps-cstat-row{display:flex;gap:3pt;margin-bottom:3pt;}
.ps-cstat{flex:1;border:1.5pt solid #58180D;border-radius:2pt;text-align:center;padding:2pt 1pt 1.5pt;}
.ps-cstat-val{font-family:Georgia,serif;font-size:13pt;font-weight:bold;line-height:1;}
.ps-cstat-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;border-top:0.75pt solid #58180D;margin-top:2pt;padding-top:1pt;}

/* ── HIT POINTS ── */
.ps-hp-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3pt;padding:3pt 4pt;}
.ps-hp-cell{text-align:center;}
.ps-hp-val{font-family:Georgia,serif;font-size:13pt;font-weight:bold;border-bottom:0.5pt solid #999;min-height:14pt;padding-bottom:1pt;}
.ps-hp-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;margin-top:1pt;}

/* ── HIT DICE + DEATH SAVES ROW ── */
.ps-hd-ds-row{display:grid;grid-template-columns:1fr 1.4fr;gap:3pt;margin-bottom:3pt;}
.ps-ds-row{display:flex;gap:6pt;padding:3pt 4pt;}
.ps-ds-col{flex:1;text-align:center;}
.ps-ds-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#444;margin-bottom:0.5pt;}
.ps-ds-pips{display:flex;gap:2.5pt;justify-content:center;}
.ps-pip{width:6pt;height:6pt;border-radius:50%;border:0.75pt solid #333;display:inline-block;}
.ps-pip.on{background:#333;}

/* ── ATTACKS TABLE ── */
.ps-atk-hdr,.ps-atk-row{display:grid;grid-template-columns:1.6fr 0.7fr 1fr;gap:2pt;padding:0 4pt;margin-bottom:2pt;}
.ps-atk-hdr span{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;border-bottom:0.5pt solid #58180D;padding-bottom:1pt;}
.ps-atk-cell{font-size:6.5pt;border-bottom:0.5pt solid #ddd;padding-bottom:2pt;min-height:9pt;}

/* ── CURRENCY ── */
.ps-coin-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3pt;margin-bottom:3pt;}
.ps-coin{text-align:center;}
.ps-coin-val{font-size:9pt;font-weight:bold;border-bottom:0.5pt solid #999;min-height:11pt;padding-bottom:1pt;}
.ps-coin-lbl{font-size:4.5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.04em;}
.ps-equip-text{font-size:6.5pt;line-height:1.4;white-space:pre-wrap;min-height:38pt;}

/* ── CHARACTER TRAITS ── */
.ps-trait{margin-bottom:4pt;}
.ps-trait-lbl{font-size:5pt;font-weight:bold;text-transform:uppercase;color:#58180D;letter-spacing:0.06em;border-bottom:0.5pt solid #58180D;padding-bottom:1pt;margin-bottom:2pt;}

const SPELL_DATA={
  "Acid Splash":{desc:"Hurl a bubble of acid at one or two creatures within 5 ft of each other (60 ft range). DEX save or 1d6 acid damage each.",short:"DEX save or 1d6 acid (two targets ok)"},
  "Aid":{desc:"Up to 3 creatures gain +5 maximum HP and 5 current HP. Lasts 8 hours.",short:"+5 max HP to 3 creatures"},
  "Alarm":{desc:"Set a magical alarm over a 20-ft cube. Alerts you (mental ping) or anyone nearby (audible bell) when a Tiny or larger creature enters. Ritual.",short:"Alert when creatures enter an area"},
  "Alter Self":{desc:"Choose Aquatic Adaptation (breathe water, swim speed), Change Appearance (alter looks), or Natural Weapon (unarmed 1d6 + type).",short:"Change form: aquatic, appearance, or natural weapon"},
  "Animate Dead":{desc:"Raise up to 3 skeletons or zombies from nearby corpses. They obey your verbal commands for 24 hours (re-cast to maintain).",short:"Raise up to 3 skeletons or zombies"},
  "Animate Objects":{desc:"Animate up to 10 nonmagical objects. They attack targets you designate (bonus action). Scales with size and number.",short:"Animate up to 10 objects to attack"},
  "Animal Friendship":{desc:"Convince a Beast with INT 3 or lower that you mean it no harm. WIS save negates. Lasts 24 hours.",short:"Charm a simple beast for 24 hours"},
  "Animal Messenger":{desc:"Compel a Tiny Beast to carry a message to a recipient you describe. It travels for 24 hours. Ritual.",short:"Send a beast with a message"},
  "Animal Shapes":{desc:"Transform up to 8 willing allies into Beast forms of CR 4 or lower. They keep their mental stats.",short:"Turn up to 8 allies into CR 4 beasts"},
  "Antilife Shell":{desc:"Shimmering 10-ft barrier prevents Beasts and Humanoids from entering or passing through. Lasts 1 hour (concentration).",short:"10-ft barrier blocks beasts and humanoids"},
  "Antimagic Field":{desc:"10-ft sphere centered on you suppresses all magic inside — spells, magic items, and magical effects are nullified.",short:"10-ft sphere suppresses all magic"},
  "Antipathy/Sympathy":{desc:"Choose Antipathy (WIS save or creatures flee a target) or Sympathy (WIS save or creatures are drawn to a target). Lasts 10 days.",short:"Repel or attract creature types toward an object"},
  "Arcane Eye":{desc:"Create an invisible floating sensor you can see through (Darkvision 30 ft). Bonus action to move it 30 ft. Ritual. 1 hour.",short:"Invisible eye you can see through"},
  "Arcane Gate":{desc:"Two linked portals (5-ft diameter rings) up to 500 ft apart. Creatures can pass between them for 10 minutes.",short:"Two linked portals up to 500 ft apart"},
  "Arcane Lock":{desc:"Lock a door, window, gate, or chest. Only you and specified creatures can open it normally. Knock suppresses it briefly.",short:"Magically lock a door or container"},
  "Armor of Agathys":{desc:"Gain 5 temporary HP. While those HP remain, each creature that hits you takes 5 cold damage. Scales at higher levels.",short:"5 temp HP; attacker takes 5 cold"},
  "Arms of Hadar":{desc:"Tendrils erupt from you. Each creature within 10 ft makes a STR save or takes 2d6 necrotic and loses its reaction until next turn.",short:"STR save or 2d6 necrotic, lose reaction (10 ft)"},
  "Astral Projection":{desc:"You and up to 8 willing creatures project into the Astral Plane. Silver cords tether you to your body. Ends if cord severs.",short:"Project into the Astral Plane with companions"},
  "Augury":{desc:"Roll divination dice for a one-word omen (Weal, Woe, Weal and Woe, or Nothing) about a 30-minute course of action. Ritual.",short:"Omen for a planned action (ritual)"},
  "Aura of Life":{desc:"30-ft aura for 10 minutes. Allies inside resist necrotic damage and are restored to 1 HP if reduced to 0 (once).",short:"30-ft aura: allies resist necrotic, revive at 1 HP"},
  "Aura of Purity":{desc:"30-ft aura for 10 minutes. Allies can't be Diseased, resist poison damage, and have advantage on CON/DEX/WIS saves.",short:"30-ft aura: disease immunity, resist poison"},
  "Aura of Vitality":{desc:"Radiant aura activates for 1 minute. Bonus action each turn: one creature in 30 ft regains 2d6 HP.",short:"Bonus action: heal 2d6 HP/turn in 30-ft aura"},
  "Awaken":{desc:"Touch a Huge or smaller Beast or Plant. It gains INT 10, a language, and is charmed by you for 30 days. Permanent thereafter.",short:"Grant INT 10 and language to a beast or plant"},
  "Bane":{desc:"Up to 3 creatures subtract 1d4 from attack rolls and saving throws. CHA save negates. 1 minute (concentration).",short:"Up to 3 creatures: −1d4 to attacks and saves"},
  "Banishment":{desc:"Force a creature to make a CHA save or be banished to its home plane (permanent if native) or a demiplane (1 minute). Concentration.",short:"CHA save or banished to home plane"},
  "Banishing Smite":{desc:"On weapon hit, deal +5d10 force. If target has 50 HP or fewer after the hit, it is banished.",short:"+5d10 force; banish if ≤50 HP remain"},
  "Barkskin":{desc:"Touch a willing creature. Its AC can't be less than 17 (no armor). Lasts 1 hour. No concentration.",short:"AC can't be less than 17 for 1 hour"},
  "Beacon of Hope":{desc:"Up to 3 creatures gain advantage on WIS saves and death saving throws, and regain the maximum HP from any healing. 1 minute.",short:"Max healing + advantage on WIS/death saves"},
  "Beast Sense":{desc:"See and hear through a willing Beast's senses for 1 hour (concentration). Can switch between your senses and the beast's. Ritual.",short:"See and hear through a beast's senses"},
  "Bestow Curse":{desc:"Touch a creature (WIS save negates). Choose a curse: disadvantage on a stat, disadvantage on attacks vs. you, extra necrotic on hits, or wasted actions. 1 minute (concentration).",short:"WIS save or suffer a chosen curse"},
  "Bigby's Hand":{desc:"Large hand of shimmering force (AC 20, HP = caster's). Choose Clenched Fist (4d8 force), Forceful Hand (push), Grasping Hand (restrain), or Interposing Hand (cover).",short:"Force hand: slam, push, grapple, or block"},
  "Blade Barrier":{desc:"Wall of whirling blades, 100 ft long, 20 ft high, 5 ft thick. DEX save or 6d10 slashing on entry. 10 minutes (concentration).",short:"Wall of blades: DEX save or 6d10 slashing"},
  "Blade Ward":{desc:"Resistance to Bludgeoning, Piercing, and Slashing damage from weapon attacks until end of your next turn.",short:"Resistance to weapon damage until next turn"},
  "Bless":{desc:"Up to 3 creatures add 1d4 to attack rolls and saving throws for 1 minute (concentration).",short:"Up to 3 creatures: +1d4 to attacks and saves"},
  "Blight":{desc:"Withering necrotic energy drains a creature. CON save or 8d8 necrotic (plants auto-fail, double damage). No effect on undead/constructs.",short:"CON save or 8d8 necrotic (double vs. plants)"},
  "Blindness/Deafness":{desc:"Blinded or Deafen one creature you can see (CON save negates). Repeat CON save at end of each of its turns to end.",short:"CON save or Blinded or Deafened"},
  "Blink":{desc:"At the end of each of your turns, roll 1d6. On 4+, teleport to the Ethereal Plane until end of next turn.",short:"50% chance to blink to the Ethereal Plane each turn"},
  "Blinding Smite":{desc:"On weapon hit, deal +3d8 radiant. CON save or the target is Blinded until the spell ends. 1 minute (concentration).",short:"+3d8 radiant; CON save or Blinded"},
  "Blur":{desc:"Your form blurs. Attacks against you have disadvantage (unless attacker doesn't rely on sight). 1 minute (concentration).",short:"Attacks against you have disadvantage"},
  "Bones of the Earth":{desc:"Cause 1d4+1 stone pillars (5 ft radius, up to 30 ft tall) to erupt from the ground. Can also crush a prone creature.",short:"Erupt pillars of stone from the ground"},
  "Booming Blade":{desc:"Melee weapon attack sheathed in booming energy. On a hit, +1d8 thunder. If the target moves before your next turn, +1d8 more thunder.",short:"Weapon attack; extra thunder if target moves"},
  "Branding Smite":{desc:"On weapon hit, deal +2d6 radiant. The target emits dim light (5 ft) and can't be invisible for 1 minute.",short:"+2d6 radiant; target sheds light, can't be invisible"},
  "Burning Hands":{desc:"A thin sheet of flame in a 15-ft cone. DEX save or 3d6 fire damage (half on success). Ignites flammable objects.",short:"15-ft cone: DEX save or 3d6 fire"},
  "Call Lightning":{desc:"Summon a storm cloud at 100 ft. Action each turn: call a lightning bolt (10-ft radius, DEX save or 3d10 lightning). 10 min.",short:"Call bolts of lightning (3d10) each turn"},
  "Calm Emotions":{desc:"20-ft radius. WIS save to suppress Charmed or Frightened, or make creatures indifferent about non-threats for 1 minute.",short:"Suppress charm/fear or calm hostility (20 ft)"},
  "Catapult":{desc:"Hurl an object (1–5 lbs) up to 90 ft. On hit: 3d8 bludgeoning. Object stops on a hit. Scales with level.",short:"Hurl an object up to 90 ft for 3d8"},
  "Chain Lightning":{desc:"A bolt leaps to a primary target (DEX save or 10d8 lightning), then arcs to up to 3 additional targets nearby.",short:"Lightning arcs to 4 targets: DEX save or 10d8"},
  "Charm Person":{desc:"Charm a Humanoid (WIS save negates). It regards you as a friendly acquaintance for 1 hour or until harmed. It knows it was charmed after.",short:"WIS save or charmed as friendly for 1 hour"},
  "Chromatic Orb":{desc:"Ranged spell attack: 3d8 damage of a chosen type (acid, cold, fire, lightning, poison, or thunder).",short:"Ranged attack: 3d8 of chosen damage type"},
  "Circle of Death":{desc:"60-ft radius sphere of necrotic energy. CON save or 8d6 necrotic damage.",short:"60-ft radius: CON save or 8d6 necrotic"},
  "Circle of Power":{desc:"30-ft aura for 10 minutes. Allies have advantage on saves vs. spells and magical effects; on success take no damage.",short:"30-ft aura: advantage on magic saves, no damage on success"},
  "Clairvoyance":{desc:"Create an invisible sensor at a known location (up to 1 mile). See or hear through it for 10 minutes (concentration). Ritual.",short:"Invisible sensor to see/hear a remote location"},
  "Clone":{desc:"Grow an inert duplicate of a creature from a sample of its flesh. If the original dies, its soul transfers to the clone.",short:"Grow a backup body; soul transfers on death"},
  "Cloudkill":{desc:"20-ft radius sphere of yellow-green fog. CON save or 5d8 poison (half on success). Moves 10 ft away from you each turn.",short:"Poisonous fog: CON save or 5d8 poison/turn"},
  "Color Spray":{desc:"A dazzling array of flashing colors in a 15-ft cone. Creatures with 6d10 HP or fewer (from lowest) are Blinded until your next turn.",short:"15-ft cone: blind weakest creatures (6d10 HP)"},
  "Command":{desc:"Give a one-word command to one creature (CHA save negates). It obeys on its next turn. Options: Approach, Drop, Flee, Grovel, Halt.",short:"CHA save or obey a one-word command"},
  "Commune":{desc:"Contact your deity for up to 3 yes/no questions. Once per day. Ritual.",short:"Ask deity 3 yes/no questions (ritual)"},
  "Commune with Nature":{desc:"Gain awareness of surrounding terrain in a 3-mile radius (6 miles outdoors): creatures, hazards, plants, and settlements. Ritual.",short:"Learn about terrain and creatures nearby (ritual)"},
  "Compelled Duel":{desc:"Force a creature to fight only you (WIS save negates). It has disadvantage attacking others and must move toward you if it moves. Concentration.",short:"WIS save or creature can only attack you"},
  "Compulsion":{desc:"WIS save or up to 4 creatures you choose in 30 ft are forced to move in a direction you designate on each of their turns. Concentration.",short:"WIS save or move in your chosen direction"},
  "Comprehend Languages":{desc:"Understand the literal meaning of any language you hear or read for 1 hour. Ritual.",short:"Understand any spoken or written language (ritual)"},
  "Cone of Cold":{desc:"60-ft cone of freezing air. CON save or 8d8 cold damage. Creatures killed become frozen statues.",short:"60-ft cone: CON save or 8d8 cold"},
  "Conjure Animals":{desc:"Call forth Fey spirits in animal form. Summon one CR 2, two CR 1, or four CR ½ creatures of the Beast type.",short:"Summon beast spirits (CR ½–2)"},
  "Conjure Barrage":{desc:"Throw a weapon or piece of ammunition; it multiplies into a 60-ft cone. DEX save or 3d8 of the weapon's damage type.",short:"60-ft cone: DEX save or 3d8 weapon damage"},
  "Conjure Elemental":{desc:"Conjure an elemental of CR 5 or lower (fire, water, earth, or air). It is friendly if you concentrate; hostile if concentration breaks.",short:"Summon a CR 5 elemental (hostile if concentration breaks)"},
  "Conjure Fey":{desc:"Conjure a Fey creature of CR 6 or lower. It obeys you for 1 hour (concentration); hostile if concentration breaks.",short:"Summon a CR 6 fey creature"},
  "Conjure Minor Elementals":{desc:"Summon elemental spirits in the form of tiny elementals. CR ½ or lower, number varies by level. Obey your commands.",short:"Summon small elemental spirits"},
  "Conjure Volley":{desc:"Fire one piece of ammunition into the air; it multiplies into a 40-ft-radius, 20-ft-tall cylinder. DEX save or 8d8 of the ammo's damage type.",short:"40-ft cylinder: DEX save or 8d8 ammo damage"},
  "Conjure Woodland Beings":{desc:"Summon Fey spirits that take the form of woodland creatures. Up to four CR ½ or two CR 1 Fey.",short:"Summon fey woodland creature spirits"},
  "Contact Other Plane":{desc:"Contact a planar entity and ask 5 yes/no questions. Risky: INT save or take 6d6 psychic and be Stunned for 1d6×10 minutes. Ritual.",short:"Ask an extraplanar entity 5 questions (risky, ritual)"},
  "Contagion":{desc:"Melee spell attack; after 3 failed STR saves, the target gains a debilitating disease (Blinding Sickness, Filth Fever, Flesh Rot, etc.).",short:"Infect with a debilitating disease (3 failed saves)"},
  "Contingency":{desc:"Store a spell of 5th level or lower. It triggers automatically when a condition you define occurs. Lasts 10 days.",short:"Stored spell triggers automatically on a condition"},
  "Control Flames":{desc:"Manipulate a nonmagical flame within 60 ft: expand, extinguish, change color/shape, or make simple shapes.",short:"Manipulate a nonmagical flame"},
  "Control Water":{desc:"Choose Flood, Part Water, Redirect Flow, or Whirlpool in a 100-ft cube of water. Concentration 10 minutes.",short:"Control water: flood, part, redirect, or whirlpool"},
  "Control Weather":{desc:"Change the weather in a 5-mile radius. Takes 10 minutes per stage change. Concentration 8 hours.",short:"Change weather in a 5-mile area (8 hours)"},
  "Control Winds":{desc:"Change wind speed and direction in a 100-ft cube for 1 hour (concentration). Choose Gusts, Downdraft, or Updraft.",short:"Control wind in a 100-ft cube for 1 hour"},
  "Cordon of Arrows":{desc:"Plant up to 4 pieces of ammunition around a point. Each fires at the first creature coming within 30 ft (DEX save or 1d6 piercing).",short:"4 arrows fire at intruders within 30 ft"},
  "Counterspell":{desc:"Reaction: interrupt a spell being cast. Automatically cancels spells of 3rd level or lower. Higher: make an ability check (DC 10 + spell level).",short:"Reaction: cancel a spell being cast"},
  "Create Bonfire":{desc:"Conjure a bonfire in a 5-ft cube. Creatures entering or starting their turn there make DEX save or take 1d8 fire.",short:"Bonfire: DEX save or 1d8 fire"},
  "Create Food and Water":{desc:"Create 45 lbs of food and 30 gallons of water — enough for 15 Medium creatures for a day.",short:"Create food and water for 15 creatures"},
  "Create Undead":{desc:"Create up to 3 ghouls from Humanoid corpses. They obey your commands for 24 hours (re-cast to maintain).",short:"Create 3 ghouls from corpses"},
  "Crown of Madness":{desc:"Madness overcomes one Humanoid (WIS save negates). It must use its action to attack a creature near it. Ends if it moves far from you. Concentration.",short:"WIS save or forced to attack nearby creatures"},
  "Crusader's Mantle":{desc:"30-ft aura pulses with divine energy. Allies inside deal +1d4 radiant damage on weapon attacks. Concentration 1 minute.",short:"30-ft aura: allies deal +1d4 radiant on weapon hits"},
  "Cure Wounds":{desc:"Restore 2d8 + spellcasting modifier HP to a creature you touch.",short:"Heal 2d8 + modifier HP by touch"},
  "Dancing Lights":{desc:"Create up to 4 glowing orbs that shed dim light in 10 ft. Move them up to 60 ft per turn as a bonus action.",short:"Create 4 floating dim-light orbs"},
  "Darkness":{desc:"15-ft sphere of magical darkness from a point or object. Blocks darkvision. Dispels light spells of 2nd level or lower.",short:"15-ft sphere of magical darkness"},
  "Darkvision":{desc:"Touch a willing creature; it gains Darkvision out to 60 ft for 8 hours.",short:"Grant Darkvision 60 ft for 8 hours"},
  "Dawn":{desc:"A 30-ft-radius, 40-ft-tall cylinder of sunlight. 4d10 radiant on entry (CON save halves). Dispels magical darkness. Concentration 1 minute.",short:"30-ft sunlight cylinder: 4d10 radiant on entry"},
  "Daylight":{desc:"60-ft radius of bright light (sunlight) fills from a point or object for 1 hour. Dispels magical darkness of 3rd level or lower.",short:"60-ft sphere of sunlight for 1 hour"},
  "Death Ward":{desc:"The next time the warded creature would drop to 0 HP, it drops to 1 HP instead (once). Lasts 8 hours.",short:"Once: drop to 1 HP instead of 0"},
  "Delayed Blast Fireball":{desc:"Glowing bead that explodes when touched, dismissed, or after 1 minute. Explosion = 12d6 fire in 20-ft radius (DEX halves). Damage grows 1d6/round.",short:"Delayed explosion: up to 12d6+ fire (20-ft radius)"},
  "Demiplane":{desc:"Create a shadowy door to an extradimensional room (30 ft on a side). Lasts 1 hour.",short:"Create a door to an extradimensional room"},
  "Destructive Wave":{desc:"Stomp the ground; 30-ft radius. CON save or 5d6 thunder + 5d6 radiant or necrotic, and knocked Prone.",short:"30-ft radius: CON save or 5d6 thunder + 5d6 radiant"},
  "Detect Evil and Good":{desc:"Know if any aberrations, celestials, elementals, fey, fiends, or undead are within 30 ft. Sense sacred/desecrated ground. Concentration.",short:"Sense otherworldly beings within 30 ft"},
  "Detect Magic":{desc:"Sense magic within 30 ft; see auras and discern schools of magic by using an action. Concentration. Ritual.",short:"Sense and see magical auras within 30 ft (ritual)"},
  "Detect Poison and Disease":{desc:"Sense the presence of poisons, poisonous creatures, and disease within 30 ft for 10 minutes (concentration). Ritual.",short:"Sense poison and disease within 30 ft (ritual)"},
  "Detect Thoughts":{desc:"Read the surface thoughts of a creature (INT save to resist probing deeper). Concentration 1 minute.",short:"Read surface thoughts; probe deeper with save"},
  "Dimension Door":{desc:"Teleport yourself and one willing creature up to 500 ft to a location you can see or know.",short:"Teleport you and one ally up to 500 ft"},
  "Disguise Self":{desc:"Change your appearance (height ±1 ft, weight, clothing, hair, facial features) for 1 hour. Doesn't change statistics.",short:"Change your appearance for 1 hour"},
  "Disintegrate":{desc:"Ranged spell attack: 10d6+40 force damage. If this reduces the target to 0 HP, it is disintegrated into fine dust.",short:"Ranged attack: 10d6+40 force; disintegrates on kill"},
  "Dispel Evil and Good":{desc:"Celestials, elementals, fey, fiends, and undead have disadvantage on attacks against you. Bonus action: end charmed/frightened/possessed by such a creature.",short:"Otherworldly beings have disadvantage attacking you"},
  "Dispel Magic":{desc:"End one spell on a target (auto-ends ≤3rd level; ability check for higher). Doesn't require concentration.",short:"End a spell on a target (auto ≤3rd level)"},
  "Dissonant Whispers":{desc:"WIS save or 3d6 psychic and use reaction to move away. Even on success, still frightened briefly (no move).",short:"WIS save or 3d6 psychic and flee"},
  "Divination":{desc:"Contact a divine power for a truthful one-word answer about an event in the next 7 days. Ritual. Daily reliability decreases with reuse.",short:"Get a truthful answer about near-future events (ritual)"},
  "Divine Favor":{desc:"Your weapon attacks deal +1d4 radiant damage for 1 minute (concentration).",short:"+1d4 radiant on weapon attacks for 1 minute"},
  "Divine Word":{desc:"Utter a divine word. Creatures that can hear it with certain HP totals are Deafened, Blinded, Stunned, or instantly killed. Fiends/undead/elementals/celestials may be banished.",short:"Utterance kills or debilitates by HP threshold"},
  "Dominate Beast":{desc:"CHA save or a Beast obeys your telepathic commands for 1 minute (concentration). It can repeat saves when damaged.",short:"CHA save or control a beast for 1 minute"},
  "Dominate Monster":{desc:"CHA save or any creature obeys your telepathic commands for 1 hour (concentration). Repeats save when damaged.",short:"CHA save or control any creature for 1 hour"},
  "Dominate Person":{desc:"CHA save or a Humanoid obeys your telepathic commands for 1 minute (concentration). Repeats save when damaged.",short:"CHA save or control a humanoid for 1 minute"},
  "Drawmij's Instant Summons":{desc:"Ritual; touch an object (≤10 lbs). Later, speak its name to teleport it into your hand from any distance. Requires 1000 gp sapphire.",short:"Teleport a marked object to your hand instantly"},
  "Dream":{desc:"You or a messenger enters the target's dream. Can deliver a message, gather info, or haunt (3d6 psychic, no rest benefits).",short:"Enter a target's dream; message or haunt"},
  "Druidcraft":{desc:"Minor druid tricks: predict weather, cause a flower to bloom, create a sensory effect, or light/extinguish a small flame.",short:"Minor nature tricks: predict weather, bloom plants"},
  "Earth Tremor":{desc:"Tremors rattle creatures within 10 ft. DEX save or 1d6 bludgeoning and knocked Prone. Loose earth becomes difficult terrain.",short:"DEX save or 1d6 bludgeoning + knocked prone (10 ft)"},
  "Earthquake":{desc:"Shaking in a 100-ft circle for 1 minute. CON save or knocked Prone; concentration checks; structures take damage.",short:"100-ft shaking: prone, concentration checks, damage"},
  "Elemental Weapon":{desc:"Touch a nonmagical weapon. It becomes +1, and deals +1d4 of chosen element (acid, cold, fire, lightning, or thunder).",short:"Make a weapon +1 magical with +1d4 elemental damage"},
  "Eldritch Blast":{desc:"Ranged spell attack: 1d10 force damage. Fire multiple beams at higher levels. Invocations can add bonus effects.",short:"Ranged force bolt: 1d10 (more at higher levels)"},
  "Enhance Ability":{desc:"Grant advantage on checks of one ability type (STR, DEX, CON, INT, WIS, or CHA) with bonus effects (e.g., CON = 2d6 temp HP).",short:"Advantage on all checks of one ability type"},
  "Enlarge/Reduce":{desc:"Double or halve a creature's size and stats (CON save for unwilling). Enlarged: +1d4 weapon damage. Reduced: −1d4.",short:"Double or halve a creature's size"},
  "Ensnaring Strike":{desc:"On weapon hit, STR save or restrained by vines. Each turn the target makes STR save to break free or takes 1d6 piercing.",short:"On hit: STR save or restrained by vines"},
  "Entangle":{desc:"Grasping weeds fill a 20-ft square. STR save or Restrained. Difficult terrain for all. Concentration 1 minute.",short:"20-ft square: STR save or restrained (difficult terrain)"},
  "Enthrall":{desc:"WIS save or one creature is fixated on you, giving disadvantage on Perception checks not aimed at you. 1 minute.",short:"WIS save or creature is distracted by you"},
  "Erupting Earth":{desc:"Ground in a 20-ft cube erupts violently. DEX save or 3d12 bludgeoning damage. Becomes difficult terrain.",short:"20-ft cube: DEX save or 3d12 bludgeoning + difficult terrain"},
  "Etherealness":{desc:"Step into the Border Ethereal. You can see the Material Plane but can't affect it or be affected by it. Move through solid objects.",short:"Enter the Ethereal Plane; pass through objects"},
  "Evard's Black Tentacles":{desc:"20-ft square filled with writhing tentacles. STR save or Restrained and 3d6 bludgeoning per turn. Difficult terrain.",short:"20-ft square tentacles: STR save or restrained + 3d6"},
  "Expeditious Retreat":{desc:"Bonus action to take the Dash action on each of your turns. Lasts 10 minutes (concentration).",short:"Bonus action: Dash each turn for 10 minutes"},
  "Eyebite":{desc:"Target one creature per turn for 1 minute. WIS save or choose: Asleep (unconscious), Panicked (frightened + flee), or Sickened (disadvantage on attacks and checks).",short:"WIS save each turn: asleep, panicked, or sickened"},
  "Fabricate":{desc:"Transform raw materials into a finished product. Up to a 10-ft cube of material. Requires appropriate proficiency for fine work.",short:"Transform raw materials into a finished item"},
  "Faerie Fire":{desc:"Objects and creatures in a 20-ft cube are outlined in light. Attacks against outlined creatures/objects have advantage; they can't be invisible.",short:"20-ft cube: attacks have advantage, can't hide"},
  "False Life":{desc:"Gain 2d4+4 temporary HP as a faint necromantic mimicry of life.",short:"Gain 2d4+4 temporary HP"},
  "Fear":{desc:"30-ft cone. WIS save or Frightened for 1 minute — must use Dash to move away. Repeat save at end of each turn.",short:"30-ft cone: WIS save or frightened, must flee"},
  "Feather Fall":{desc:"Reaction. Up to 5 falling creatures/objects descend at 60 ft/round and take no fall damage. Lasts 1 minute.",short:"Reaction: 5 creatures fall safely"},
  "Feign Death":{desc:"Touch a willing creature; it appears dead (unconscious, undetectable by nonmagical means). All damage types are resistance except psychic. Lasts 1 hour.",short:"Creature appears and is treated as dead for 1 hour"},
  "Feeblemind":{desc:"INT save or INT and CHA scores drop to 1. Can't cast spells, communicate, or use magic items. Repeat save monthly.",short:"INT save or INT/CHA drop to 1, can't cast spells"},
  "Find Familiar":{desc:"Summon a Fey spirit in animal form (bat, cat, frog, hawk, etc.). It can deliver touch spells and grants you its senses.",short:"Summon a spirit animal companion"},
  "Find Steed":{desc:"Summon a spirit in the form of a warhorse, pony, mastiff, or similar. It is an intelligent companion that understands your language.",short:"Summon an intelligent spirit steed"},
  "Find the Path":{desc:"Know the most direct physical route to a location on the same plane. Always know if you're on the right path.",short:"Always know the direction to a destination"},
  "Find Traps":{desc:"Sense the presence of any trap within 120 ft that is within line of sight (not the exact nature or location).",short:"Sense the presence of traps within 120 ft"},
  "Fire Bolt":{desc:"Ranged spell attack: 1d10 fire damage. Ignites flammable objects. Scales at levels 5, 11, and 17.",short:"Ranged attack: 1d10 fire"},
  "Fire Shield":{desc:"Warm shield (cold resistance, attackers take 2d8 fire) or Chill Shield (fire resistance, attackers take 2d8 cold). Lasts 10 minutes.",short:"Resistance to fire/cold; attackers take 2d8 back"},
  "Fire Storm":{desc:"10 10-ft cubes of roaring flame (can arrange them). DEX save or 7d10 fire. Plants automatically fail. Kills nonmagical plant matter.",short:"10 cubes of fire: DEX save or 7d10 fire"},
  "Fireball":{desc:"Bright streak explodes in a 20-ft radius sphere. DEX save or 8d6 fire. Ignites flammable objects.",short:"20-ft radius explosion: DEX save or 8d6 fire"},
  "Flame Blade":{desc:"Summon a fiery scimitar in your free hand. Use bonus action to attack (melee spell attack): 3d6 fire damage. Sheds bright light 10 ft.",short:"Fiery scimitar: 3d6 fire on hit (bonus action attack)"},
  "Flame Strike":{desc:"Divine fire descends in a 10-ft radius, 40-ft-high cylinder. DEX save or 4d6 fire + 4d6 radiant.",short:"10-ft cylinder: DEX save or 4d6 fire + 4d6 radiant"},
  "Flaming Sphere":{desc:"5-ft ball of fire moves 30 ft (bonus action). Creatures within 5 ft make DEX save or 2d6 fire. 1 minute (concentration).",short:"Rolling fire sphere: DEX save or 2d6 fire/turn"},
  "Flesh to Stone":{desc:"CON save or progressively petrified. Fail 3 times over 6 rounds: permanently Petrified. Succeed 3 times: immune for 24 hours.",short:"CON save or become Petrified (3 failed saves)"},
  "Fly":{desc:"Touch a willing creature; it gains a flying speed of 60 ft for 10 minutes (concentration).",short:"Grant fly speed 60 ft for 10 minutes"},
  "Fog Cloud":{desc:"20-ft radius sphere of thick fog, heavily obscured. Blocks line of sight. 1 hour (concentration).",short:"20-ft radius of heavily obscuring fog"},
  "Forbiddance":{desc:"Ritual. Ward an area up to 40,000 sq ft. Blocks teleportation and planar travel; deal 5d10 radiant or necrotic to certain creature types that enter.",short:"Ward area vs. teleportation; damage invaders (ritual)"},
  "Forcecage":{desc:"A 20-ft cube of invisible force walls, or a 10-ft cage. Creatures inside can't teleport or be summoned out. 1 hour.",short:"Invisible force prison; no teleportation escape"},
  "Foresight":{desc:"Touch a willing creature for 8 hours. Advantage on all checks; can't be Surprised; attacks against it have disadvantage.",short:"8 hours: advantage everywhere, can't be surprised"},
  "Freedom of Movement":{desc:"Touch a willing creature. Unaffected by nonmagical difficult terrain or paralysis. Freely escape grapples. 1 hour.",short:"Ignore difficult terrain, grapples, and paralysis"},
  "Friends":{desc:"Advantage on CHA checks directed at one non-hostile creature. When the spell ends, the creature knows it was magicked and becomes hostile.",short:"Advantage on CHA checks vs. one creature (turns hostile after)"},
  "Frostbite":{desc:"CON save or 1d6 cold damage and disadvantage on the next weapon attack roll before end of next turn.",short:"CON save or 1d6 cold + disadvantage on next attack"},
  "Gaseous Form":{desc:"Willing creature becomes a misty cloud. Fly 10 ft, hover. Resistance to nonmagical damage. Can't attack or cast spells. 1 hour (concentration).",short:"Become a cloud: fly, resist damage, pass through cracks"},
  "Gate":{desc:"Open a shimmering portal to another plane. Choose to open a conduit for a specific celestial, fiend, or elemental to enter.",short:"Open a portal to another plane; call a specific being"},
  "Geas":{desc:"WIS save or compelled to carry out a service or avoid an action. 1000 gp fine if violated (30 days of psychic damage). 30 days.",short:"WIS save or compelled to obey for 30 days"},
  "Giant Insect":{desc:"Transform up to 10 insects into giant forms (or 3 wasps, a centipede, or 1 spider). They obey your commands for 10 minutes.",short:"Transform insects into giant monstrous forms"},
  "Globe of Invulnerability":{desc:"Immobile 10-ft sphere. Spells of 5th level or lower can't pass into the sphere. 1 minute (concentration).",short:"10-ft sphere: blocks all spells of 5th level or lower"},
  "Glibness":{desc:"For 1 hour, all CHA checks return a minimum of 15. Lie-detecting spells and features can't detect your lies.",short:"CHA checks min 15; lies undetectable for 1 hour"},
  "Glyph of Warding":{desc:"Inscribe a magical glyph on a surface or object. Triggers on a set condition. Choose Explosive Runes (5d8) or Spell Glyph (store any ≤3rd-level spell).",short:"Inscribe a trap glyph that triggers on a condition"},
  "Goodberry":{desc:"Up to 10 berries, each restoring 1 HP and providing a full day's nourishment. Last for 24 hours.",short:"Create 10 berries; each heals 1 HP, provides nourishment"},
  "Grasping Vine":{desc:"A vine appears at a point you choose. It can grab one creature within 30 ft (DEX save or pulled 20 ft toward the vine and Restrained).",short:"DEX save or grabbed and pulled 20 ft by a vine"},
  "Grease":{desc:"Cover a 10-ft square in slick grease. DEX save to avoid falling Prone. Difficult terrain for the duration.",short:"10-ft square: DEX save or Prone, difficult terrain"},
  "Greater Invisibility":{desc:"A creature becomes invisible for 1 minute (concentration). Unlike normal invisibility, this persists when attacking or casting spells.",short:"Invisible for 1 minute while still attacking"},
  "Greater Restoration":{desc:"Remove one of: an exhaustion level, a charm/petrify effect, a curse, an ability score reduction, or a max HP reduction.",short:"Remove exhaustion, a condition, or a curse"},
  "Green-Flame Blade":{desc:"Melee weapon attack wrapped in green flame. On a hit, fire leaps to a second creature within 5 ft for 1d8 fire + spellcasting modifier.",short:"Weapon attack; fire leaps to nearby creature"},
  "Guards and Wards":{desc:"Protect a large area (up to 2500 sq ft/level) with magical defenses: fog, confusion, magical locks, summoned guardians, and more.",short:"Protect a large area with multiple magical wards"},
  "Guidance":{desc:"Touch a willing creature; it can add 1d4 to one ability check before the spell ends. Concentration 1 minute.",short:"Target adds 1d4 to one ability check"},
  "Guiding Bolt":{desc:"Ranged spell attack: 4d6 radiant damage. The next attack against the creature has advantage (it shimmers with light).",short:"Ranged attack: 4d6 radiant; next attack has advantage"},
  "Gust":{desc:"Blow a 5-ft cube of wind: push one creature 5 ft (STR save), move one object up to 10 ft, or create a wind sensation.",short:"Small gust: push a creature or move an object"},
  "Hail of Thorns":{desc:"When you hit with a ranged weapon attack, the arrow bursts into thorns: 1d10 piercing to the target and each creature within 5 ft (DEX save halves).",short:"On ranged hit: 1d10 piercing burst (5-ft radius)"},
  "Hallucinatory Terrain":{desc:"Make a natural terrain feature (24-hr, concentration) appear as a different natural terrain type (sight, sound, smell). Touch reveals illusion.",short:"Make terrain look, sound, smell like different terrain"},
  "Harm":{desc:"Ranged spell attack: 14d6 necrotic damage. CON save halves. Reduces target's HP maximum by damage taken (until long rest).",short:"14d6 necrotic; reduces HP maximum on hit"},
  "Haste":{desc:"One willing creature gets doubled speed, +2 AC, advantage on DEX saves, and one extra Attack action per turn. 1 minute (concentration). Lethargic afterward.",short:"Double speed, +2 AC, extra attack for 1 minute"},
  "Heal":{desc:"A creature you touch regains 70 HP and is cured of any disease, Blindness, and Deafness.",short:"Heal 70 HP; cure disease, blindness, deafness"},
  "Healing Word":{desc:"Bonus action. Restore 2d4 + spellcasting modifier HP to a creature within 60 ft.",short:"Bonus action: heal 2d4 + modifier HP at 60 ft"},
  "Hellish Rebuke":{desc:"Reaction when you take damage: 2d10 fire to the attacker (DEX save halves). Immediate reaction.",short:"Reaction: 2d10 fire to attacker (DEX halves)"},
  "Heroes' Feast":{desc:"A feast for up to 12 creatures. Takes 1 hour to eat. Grants: immunity to poison and fright, resistance to poison, advantage on WIS saves, and +2d10 max HP for 24 hours.",short:"Feast: +2d10 HP, immune poison/fright for 24 hours"},
  "Heroism":{desc:"A willing creature is immune to Frightened and gains temporary HP equal to your spellcasting modifier at the start of each turn. 1 minute (concentration).",short:"Immune to frightened; temp HP each turn"},
  "Hex":{desc:"Curse a creature. Deal +1d6 necrotic on each hit. The target has disadvantage on a chosen ability check type. Moves to new target when old one dies.",short:"+1d6 necrotic on hits; disadvantage on chosen checks"},
  "Hold Monster":{desc:"Paralyze any creature (WIS save). Repeat save at end of each of its turns. Concentration 1 minute.",short:"WIS save or Paralyzed (any creature type)"},
  "Hold Person":{desc:"Paralyze a Humanoid (WIS save). Repeat save at end of each of its turns. Concentration 1 minute.",short:"WIS save or Paralyzed (humanoid only)"},
  "Holy Aura":{desc:"30-ft aura for 1 minute. Allies have advantage on saves and attackers have disadvantage; on a hit, Fiends/Undead are Blinded (CON save negates).",short:"30-ft aura: advantage on saves; Blinded fiends/undead"},
  "Holy Weapon":{desc:"Touch a weapon; it deals +2d8 radiant on a hit. Bonus action: blinding burst of radiance (CON save, 4d8 radiant + Blinded). Concentration 1 hour.",short:"+2d8 radiant on hits; burst blinds enemies"},
  "Hunger of Hadar":{desc:"A 20-ft sphere of cold, dark void. Creatures inside are Blinded, take 2d6 cold at start of turn, and 2d6 acid at end (DEX save halves). Concentration 1 minute.",short:"20-ft void: Blinded, 2d6 cold and acid each turn"},
  "Hunter's Mark":{desc:"Mark a creature. Deal +1d6 damage to it on each hit. Know its direction if within 60 ft. Can transfer mark to new target.",short:"+1d6 damage to marked target; track its location"},
  "Hypnotic Pattern":{desc:"30-ft cube of swirling colors. WIS save or Incapacitated and speed 0 for 1 minute. Ends if disturbed. Concentration.",short:"30-ft cube: WIS save or incapacitated (fascinated)"},
  "Ice Knife":{desc:"Hurl a shard of ice (ranged spell attack): 1d10 piercing. On hit or miss, shard explodes: DEX save or 2d6 cold to creatures within 5 ft.",short:"Ice shard: 1d10 piercing + 2d6 cold burst"},
  "Ice Storm":{desc:"20-ft radius, 40-ft-high cylinder. 2d8 bludgeoning + 4d6 cold (DEX save halves). Area becomes difficult terrain.",short:"20-ft cylinder: DEX save or 2d8+4d6 cold damage"},
  "Identify":{desc:"Learn an item's properties, command words, and charges. Or learn what spells are affecting a creature. Ritual.",short:"Learn properties of a magic item or spell (ritual)"},
  "Imprisonment":{desc:"WIS save or a creature is imprisoned in a demiplane (Burial, Chaining, Hedged Prison, Minimus Containment, or Slumber). Lasts until dispelled.",short:"WIS save or imprisoned until dispelled"},
  "Incendiary Cloud":{desc:"20-ft radius sphere of roiling smoke and embers. 10d8 fire damage each turn (DEX save halves). Moves 10 ft from you each turn. 1 minute (concentration).",short:"20-ft smoke cloud: DEX save or 10d8 fire/turn"},
  "Inflict Wounds":{desc:"Melee spell attack: 2d10 necrotic damage.",short:"Melee attack: 2d10 necrotic"},
  "Insect Plague":{desc:"20-ft radius sphere of swarming, biting locusts. CON save or 4d10 piercing; half on success. Obscures sight, difficult terrain. 10 minutes (concentration).",short:"20-ft insect sphere: CON save or 4d10 piercing/turn"},
  "Invisibility":{desc:"A creature becomes invisible for 1 hour (concentration). Spell ends early if the creature attacks or casts a spell.",short:"Invisible for 1 hour (ends if attacking)"},
  "Jallarzi's Storm of Radiance":{desc:"Swirling storm of radiant energy in a 10-ft radius. CON save or 4d10 radiant and Blinded each turn. Concentration 1 minute.",short:"10-ft radiant storm: CON save or 4d10 + Blinded"},
  "Jump":{desc:"Touch a creature; triple its jump distance for 10 minutes.",short:"Triple jump distance for 10 minutes"},
  "Knock":{desc:"Unlock one locked, barred, or stuck object (door, window, box, or chest). Loud booming sound audible 300 ft.",short:"Unlock a locked door, chest, or window (loud)"},
  "Legend Lore":{desc:"Receive legendary lore about a person, place, or object of legendary significance. The information is cryptic if the subject is obscure.",short:"Receive lore about a legendary subject"},
  "Leomund's Secret Chest":{desc:"Hide a chest (3×2×2 ft) in the Ethereal Plane. Ritual (250 gp chest + 5 gp duplicate). Summon it as an action.",short:"Store a chest in the Ethereal Plane"},
  "Leomund's Tiny Hut":{desc:"10-ft dome shelter for 9 Medium or smaller creatures. Temperature is comfortable; creatures/objects can't pass through uninvited. Ritual.",short:"10-ft dome shelter; no uninvited entry (ritual)"},
  "Lesser Restoration":{desc:"Touch a creature to end one disease or one of: Blinded, Deafened, Paralyzed, or Poisoned.",short:"End one disease or condition by touch"},
  "Levitate":{desc:"One creature or object (≤500 lbs) rises up to 20 ft and stays there. CON save for unwilling creatures. Concentration 10 minutes.",short:"Float a creature or object up to 20 ft in the air"},
  "Light":{desc:"A touched object sheds bright light (20 ft) and dim light (20 ft more). Hostile creature can make DEX save to avoid. Lasts 1 hour.",short:"Object sheds bright light 20 ft for 1 hour"},
  "Lightning Bolt":{desc:"100-ft-long, 5-ft-wide line of lightning. DEX save or 8d6 lightning. Ignites flammable objects.",short:"100-ft lightning line: DEX save or 8d6"},
  "Locate Animals or Plants":{desc:"Sense the direction and distance to the nearest Beast or plant of a named species within 5 miles.",short:"Find direction to nearest named beast or plant"},
  "Locate Creature":{desc:"Sense the direction of a specific creature within 1000 ft (or closest of a named type). Blocked by running water.",short:"Sense direction to a specific creature within 1000 ft"},
  "Locate Object":{desc:"Sense direction to a specific known object within 1000 ft, or the nearest of a general type.",short:"Sense direction to an object within 1000 ft"},
  "Longstrider":{desc:"Touch a creature; its speed increases by 10 ft for 1 hour.",short:"+10 ft speed for 1 hour"},
  "Mage Armor":{desc:"Protect a willing creature not wearing armor. Its AC becomes 13 + DEX modifier. Lasts 8 hours.",short:"AC becomes 13 + DEX (requires no armor)"},
  "Mage Hand":{desc:"Spectral floating hand appears within 30 ft. Can manipulate objects, open unlocked doors/containers, retrieve items. Can't attack.",short:"Spectral hand manipulates objects within 30 ft"},
  "Magic Circle":{desc:"10-ft-radius, 20-ft-tall cylinder. Prevent chosen creature type (celestials, elementals, fey, fiends, undead) from entering or being summoned inside.",short:"Circle that blocks or traps one creature type"},
  "Magic Jar":{desc:"Transfer your soul into a gem. Attempt to possess a Humanoid within 100 ft (CHA save negates). 1 hour; no concentration.",short:"Possess a humanoid; soul stored in a gem"},
  "Magic Missile":{desc:"Three darts of magical force, each dealing 1d4+1 force. Each dart auto-hits and can target the same or different creatures.",short:"3 darts: 1d4+1 force each, always hit"},
  "Magic Weapon":{desc:"Touch a nonmagical weapon; it becomes a +1 magical weapon for 1 hour (concentration).",short:"Make a weapon +1 magical for 1 hour"},
  "Maelstrom":{desc:"30-ft-radius, 5-ft-deep vortex of wind and water. STR save or 6d6 bludgeoning and pulled 10 ft toward center. Difficult terrain. 1 minute (concentration).",short:"30-ft vortex: STR save or 6d6 + pulled inward"},
  "Major Image":{desc:"Create a complex illusion (20-ft cube) with sight, sound, and smell. Can animate it as a bonus action. Concentration 10 minutes.",short:"20-ft cube illusion with sound, sight, and smell"},
  "Mass Cure Wounds":{desc:"Up to 6 creatures within 30 ft of a point each regain 5d8 + spellcasting modifier HP.",short:"Heal 5d8 + modifier HP to 6 creatures at once"},
  "Mass Heal":{desc:"Up to 12 creatures regain a total of 700 HP (divide as you choose). Each is also cured of disease, Blindness, and Deafness.",short:"Heal 700 HP total; cure disease, blindness, deafness"},
  "Mass Healing Word":{desc:"Bonus action. Up to 6 creatures within 60 ft each regain 2d4 + spellcasting modifier HP.",short:"Bonus action: heal 2d4 + modifier HP to 6 creatures"},
  "Mass Suggestion":{desc:"Suggest a course of action to up to 12 creatures (WIS save negates). Lasts 24 hours.",short:"WIS save or 12 creatures follow a suggestion"},
  "Maze":{desc:"A creature is banished to an extradimensional labyrinthine demiplane. DC 20 INT check each turn to escape. No concentration.",short:"Banish a creature to a labyrinth (DC 20 INT to escape)"},
  "Meld into Stone":{desc:"Step into a stone object or surface and remain there for 8 hours. See and hear normally. Ritual.",short:"Hide inside stone for up to 8 hours (ritual)"},
  "Mending":{desc:"Repair a single break or tear in an object (up to 1-ft crack). Works on a broken magic item if the parts are present.",short:"Repair a break or tear in one object"},
  "Message":{desc:"Whisper a message to a creature within 120 ft. It can whisper a reply that only you hear. Passes through barriers.",short:"Whisper a message; receive a whispered reply"},
  "Meteor Swarm":{desc:"4 massive meteors strike 4 points within 1 mile. 40-ft-radius sphere each. DEX save or 20d6 fire + 20d6 bludgeoning.",short:"4 meteors: DEX save or 20d6 fire + 20d6 bludgeoning each"},
  "Mind Blank":{desc:"Touch a willing creature for 24 hours. Immune to psychic damage, divination spells, and the Charmed condition.",short:"Immune to psychic damage and divination for 24 hours"},
  "Mind Sliver":{desc:"INT save or 1d6 psychic damage. Until end of its next turn, the target subtracts 1d4 from the next saving throw it makes.",short:"INT save or 1d6 psychic + −1d4 to next save"},
  "Minor Illusion":{desc:"Create a sound (up to human shout) or an image of an object (up to 5-ft cube). Doesn't move. Investigation check to disbelieve.",short:"Create a sound or a 5-ft-cube image"},
  "Mirage Arcane":{desc:"Transform up to 1 square mile of terrain to look, sound, smell, and feel like a different natural terrain for 10 days.",short:"Transform 1 square mile of terrain appearance"},
  "Mirror Image":{desc:"Create 3 illusory duplicates of yourself. Attackers roll a die; on certain results they hit a duplicate instead. Lasts 1 minute, no concentration.",short:"3 illusory decoys; 25–50% chance to misdirect attacks"},
  "Mislead":{desc:"Become invisible and simultaneously create an illusory double of yourself. You can see and hear through the double and cast spells through it. 1 hour (concentration).",short:"Invisible + illusory double you can cast through"},
  "Misty Step":{desc:"Bonus action: surrounded in silver mist, teleport up to 30 ft to an unoccupied space you can see.",short:"Bonus action: teleport up to 30 ft"},
  "Modify Memory":{desc:"WIS save or magically alter a creature's memory of an event in the last 24 hours (within 10 minutes of the event).",short:"WIS save or alter target's memory"},
  "Mold Earth":{desc:"Move or reshape a 5-ft cube of loose earth, create difficult terrain, or draw simple patterns in soil.",short:"Move or shape a 5-ft cube of earth"},
  "Moonbeam":{desc:"5-ft-radius, 40-ft-tall silver beam. CON save or 2d10 radiant (shapechangers disadvantaged, reverting forms). 1 minute (concentration).",short:"5-ft beam: CON save or 2d10 radiant; reverts shapechangers"},
  "Mordenkainen's Magnificent Mansion":{desc:"Create an extradimensional mansion with 100 comfortable rooms. Lasts 24 hours. Up to 100 guests.",short:"Conjure an extradimensional mansion for 24 hours"},
  "Mordenkainen's Private Sanctum":{desc:"Prevent scrying, teleportation, and planar travel in an area up to 100 ft on each side for 24 hours.",short:"Block scrying and teleportation in an area"},
  "Mordenkainen's Sword":{desc:"Summon a floating sword of force. Use bonus action each turn to attack (spell attack): 3d10 + spellcasting modifier force. 1 minute (concentration).",short:"Floating force sword attacks for 3d10 + modifier"},
  "Move Earth":{desc:"Reshape dirt, sand, or clay up to a 40-ft cube. Takes 10 minutes per 10 ft. 2 hours (concentration).",short:"Reshape terrain in a 40-ft cube over time"},
  "Nondetection":{desc:"One creature, place, or object can't be targeted or detected by any divination spell or magical scrying sensor. 8 hours.",short:"Hidden from divination and scrying for 8 hours"},
  "Otiluke's Resilient Sphere":{desc:"10-ft-diameter sphere of force traps one Large or smaller creature. Immune to damage, can't be moved out. Rolls freely. WIS save to avoid.",short:"WIS save or trapped in an indestructible sphere"},
  "Otto's Irresistible Dance":{desc:"A creature must dance on its turn (WIS save each turn to resist): disadvantage on attacks and DEX saves; attackers have advantage. 1 minute (concentration).",short:"WIS save each turn or forced to dance"},
  "Passwall":{desc:"Create a passage (up to 5×8×20 ft) through wood, plaster, or stone. Persists 1 hour.",short:"Create a passage through a wall"},
  "Pass without Trace":{desc:"+10 bonus to Stealth for yourself and up to 10 companions for 1 hour. Can't be tracked by nonmagical means. Concentration.",short:"+10 to group Stealth; can't be tracked magically"},
  "Phantom Steed":{desc:"Ritual. Conjure a Large horse-like creature with 100 ft speed. Can carry 300 lbs. Lasts 1 hour.",short:"Conjure a fast spirit horse (100 ft speed, ritual)"},
  "Phantasmal Force":{desc:"Create an illusion in a creature's mind (10-ft cube). It believes the illusion is real. INT save to perceive it's illusory. Takes 2d8 psychic per turn.",short:"Mind illusion: INT save or believe it, 2d8 psychic/turn"},
  "Phantasmal Killer":{desc:"A terrifying illusion exists only in the target's mind (WIS save to resist). Frightened; takes 4d10 psychic per turn. Repeat save each turn.",short:"WIS save or frightened + 4d10 psychic/turn"},
  "Planar Ally":{desc:"Contact an entity (a deity's servant) and appeal for aid. It may agree to a task in exchange for payment or service.",short:"Request help from a deity's servant"},
  "Planar Binding":{desc:"Bind a celestial, elemental, fey, or fiend within a magic circle to your service. CHA save negates. Lasts 24 hours.",short:"CHA save or bound extraplanar creature serves you"},
  "Plane Shift":{desc:"Transport yourself and up to 8 willing creatures to another plane of existence. Or, banish an unwanted creature to its home plane (CHA save).",short:"Travel to another plane (or banish a creature)"},
  "Plant Growth":{desc:"Cause plants to overgrow in a 100-ft radius (difficult terrain) or, over 8 hours, enrich crops in a half-mile radius.",short:"100-ft overgrowth (difficult terrain) or enrich crops"},
  "Polymorph":{desc:"Transform a creature into a Beast of CR ≤ target's level (or CR for monsters). It gains the beast's stats. CON save for unwilling.",short:"CON save or transform into a beast"},
  "Power Word Heal":{desc:"A wave of healing washes over a willing creature: restore all HP. Also end Frightened, Paralyzed, and Stunned.",short:"Restore all HP; end frightened, paralyzed, stunned"},
  "Power Word Kill":{desc:"Utter a word of power to instantly kill a creature with 100 HP or fewer. No saving throw.",short:"Instantly kill a creature with ≤100 HP (no save)"},
  "Power Word Stun":{desc:"Utter a word of power. If the target has 150 HP or fewer, it is Stunned. Makes CON save at end of each turn to end.",short:"Stun a creature with ≤150 HP (CON save each turn)"},
  "Prayer of Healing":{desc:"Up to 5 creatures within 30 ft each regain 2d8 + spellcasting modifier HP. Cast time: 10 minutes.",short:"Heal 5 creatures 2d8 + modifier (10-min cast)"},
  "Prestidigitation":{desc:"Minor magical tricks: create small sensory effects, clean or soil items, chill/warm/flavor, draw marks, or produce small objects.",short:"Minor magical tricks and sensory effects"},
  "Primordial Ward":{desc:"Grant yourself resistance to acid, cold, fire, lightning, and thunder damage for 1 minute (concentration).",short:"Resistance to all five elemental damage types"},
  "Prismatic Spray":{desc:"8 rays of color, each with a random effect: fire, cold, lightning, acid, slow/petrify, polymorph, transport, or two rays.",short:"8 random color rays with devastating effects"},
  "Prismatic Wall":{desc:"Shimmering wall of 7 layers (each a different effect). Must pass through each layer to cross. Effects include blinding, fire, cold, acid, force, poison, and planar shift.",short:"7-layer wall with escalating devastating effects"},
  "Produce Flame":{desc:"A flickering flame in your hand sheds bright light 10 ft. Can be hurled as a ranged spell attack (1d8 fire, 30 ft).",short:"Flame: shed light or hurl for 1d8 fire"},
  "Programmed Illusion":{desc:"Create a 20-ft-cube illusion (sight, sound, smell) that activates when a trigger condition is met. Lasts until dispelled.",short:"Illusion that activates on a set trigger condition"},
  "Project Image":{desc:"Create an illusory double of yourself anywhere on the same plane. Cast spells through it. The double has all your abilities. 1 day (concentration).",short:"Illusory double anywhere on the plane; cast through it"},
  "Protection from Energy":{desc:"Touch a willing creature; it gains resistance to one energy type (acid, cold, fire, lightning, or thunder). 1 hour (concentration).",short:"Resistance to one chosen energy type for 1 hour"},
  "Protection from Evil":{desc:"Protect a willing creature from aberrations, celestials, elementals, fey, fiends, and undead. They have disadvantage attacking it; it can't be possessed. 10 minutes (concentration).",short:"Protection from outsiders: disadvantage to attack you"},
